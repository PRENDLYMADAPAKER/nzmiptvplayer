<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZM FLIX | Netflix 2026 Edition</title>
    <style>
        :root { 
            --red: #E50914; --bg: #000000; --card-w: 160px; --card-h: 240px;
            --glass: rgba(40, 40, 40, 0.7);
        }
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Inter', -apple-system, sans-serif; 
            -webkit-font-smoothing: antialiased; overflow-x: hidden; 
        }

        /* --- HEADER --- */
        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; 
            justify-content: space-between; align-items: center; padding: 15px 5%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            transition: 0.3s; box-sizing: border-box;
        }
        header.scrolled { background: var(--bg); border-bottom: 0.5px solid #333; }
        .logo { color: var(--red); font-size: 26px; font-weight: 900; letter-spacing: -1.5px; text-transform: uppercase; cursor: pointer; }

        /* --- HERO BANNER --- */
        .hero { height: 85vh; background-size: cover; background-position: center top; position: relative; display: flex; align-items: center; padding: 0 5%; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 10%, transparent 50%), linear-gradient(to right, rgba(0,0,0,0.6), transparent); }
        .hero-body { position: relative; z-index: 10; max-width: 700px; }
        .hero-body h1 { font-size: clamp(2.5rem, 6vw, 4.5rem); margin: 0; font-weight: 800; line-height: 1.1; }
        .hero-btns { display: flex; gap: 12px; margin-top: 25px; }
        .btn { padding: 12px 28px; border-radius: 4px; font-weight: bold; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 16px; transition: 0.2s; }
        .btn-white { background: white; color: black; }
        .btn-white:hover { background: #e6e6e6; }
        .btn-gray { background: rgba(109, 109, 110, 0.7); color: white; backdrop-filter: blur(10px); }

        /* --- CONTENT ROWS --- */
        .section { padding: 30px 0 0 5%; }
        .section h3 { font-size: 1.3rem; margin-bottom: 15px; font-weight: 600; color: #e5e5e5; }
        .row { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 20px; scroll-behavior: smooth; }
        .row::-webkit-scrollbar { display: none; }
        
        .card { 
            min-width: var(--card-w); height: var(--card-h); border-radius: 4px; 
            background: #111; overflow: hidden; position: relative; cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .card:hover { transform: scale(1.08); z-index: 5; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { 
            position: absolute; bottom: 0; width: 100%; padding: 25px 8px 8px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            font-size: 12px; font-weight: 600; text-align: center;
        }

        /* --- SEARCH OVERLAY --- */
        #searchView { position: fixed; inset: 0; background: var(--bg); z-index: 1500; display: none; padding: 100px 5% 20px; overflow-y: auto; }
        .search-input { background: #222; border: 1px solid #444; color: white; padding: 15px 20px; border-radius: 4px; width: 100%; max-width: 500px; font-size: 16px; margin-bottom: 40px; }

        /* --- PLAYER MODAL (PC & MOBILE OPTIMIZED) --- */
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; overflow-y: auto; }
        .modal-wrapper { max-width: 1100px; margin: 0 auto; background: #141414; min-height: 100vh; position: relative; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; position: sticky; top: 0; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        iframe { width: 100%; height: 100%; border: none; }
        
        .content-details { padding: 30px 5%; }
        .tag { color: #46d369; font-weight: bold; font-size: 14px; margin-bottom: 10px; display: block; }
        .watch-btn { background: var(--red); color: white; border: none; width: 100%; max-width: 300px; padding: 16px; border-radius: 4px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .watch-btn:hover { background: #ff0a16; }

        /* EPISODE SELECTOR */
        .ep-selector { padding: 0 5% 100px; }
        .season-dropdown { background: #333; color: white; border: 1px solid #555; padding: 10px 15px; border-radius: 4px; font-size: 15px; margin-bottom: 25px; width: 160px; cursor: pointer; }
        .ep-row { display: flex; gap: 20px; padding: 20px 0; border-top: 1px solid #333; cursor: pointer; transition: 0.2s; }
        .ep-row:hover { background: rgba(255,255,255,0.05); }
        .ep-img { width: 160px; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px; background: #222; }
        .ep-meta b { font-size: 16px; display: block; margin-bottom: 6px; }
        .ep-meta p { font-size: 13px; color: #999; margin: 0; line-height: 1.5; }

        .close-btn { position: absolute; top: 20px; right: 20px; z-index: 3000; background: rgba(0,0,0,0.7); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; cursor: pointer; }

        @media (max-width: 768px) {
            :root { --card-w: 130px; --card-h: 190px; }
            .hero { height: 70vh; align-items: flex-end; padding-bottom: 50px; }
            .ep-img { width: 120px; }
            .watch-btn { max-width: 100%; }
        }
    </style>
</head>
<body>

<header id="nav">
    <div class="logo" onclick="location.reload()">NZM FLIX</div>
    <div style="display:flex; gap: 20px; align-items:center;">
        <span onclick="toggleSearch()" style="font-size: 22px; cursor:pointer;">🔍</span>
        <div style="width: 32px; height: 32px; background: #2b93d1; border-radius: 4px; cursor: pointer;"></div>
    </div>
</header>

<div id="home">
    <div id="hero" class="hero"></div>
    <div class="section"><h3>Top 10 in the Philippines</h3><div class="row" id="top-ph"></div></div>
    <div class="section"><h3>K-Drama Vibes</h3><div class="row" id="kdrama"></div></div>
    <div class="section"><h3>Kids & Family</h3><div class="row" id="kids"></div></div>
    <div class="section"><h3>Asian Action & Hits</h3><div class="row" id="asian"></div></div>
</div>

<div id="searchView">
    <input type="text" class="search-input" id="searchField" placeholder="Search for movies or series...">
    <div class="row" style="flex-wrap: wrap; justify-content: flex-start; gap: 15px;" id="searchResults"></div>
</div>

<div class="modal" id="playerModal">
    <div class="modal-wrapper">
        <button class="close-btn" onclick="closeModal()">✕</button>
        <div class="video-box" id="vContainer">
            <iframe id="mainFrame" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>
        <div class="content-details">
            <div id="meta"></div>
            <button id="mainPlayBtn" class="watch-btn">▶ WATCH NOW</button>
        </div>
        <div class="ep-selector" id="tvTools">
            <h3>Episodes</h3>
            <select class="season-dropdown" id="seasonSelect" onchange="loadEpisodes()"></select>
            <div id="episodeList"></div>
        </div>
    </div>
</div>

<script>
const KEY = "2f7637ba9b3253a84483afa03480473a";
const IMG = "https://image.tmdb.org/t/p/original";
const POSTER = "https://image.tmdb.org/t/p/w342";
let activeItem = null;

async function call(path) {
    const r = await fetch(`https://api.themoviedb.org/3${path}${path.includes('?') ? '&' : '?'}api_key=${KEY}`);
    return r.json();
}

async function init() {
    const ph = await call('/trending/all/day?region=PH');
    setHero(ph.results[0]);
    renderRow('top-ph', ph.results);

    const kd = await call('/discover/tv?with_original_language=ko&with_genres=18');
    renderRow('kdrama', kd.results);

    const kid = await call('/discover/movie?with_genres=16,10751');
    renderRow('kids', kid.results);

    const as = await call('/discover/tv?with_original_language=zh|th');
    renderRow('asian', as.results);
}

function renderRow(id, data) {
    const container = document.getElementById(id);
    data.forEach(i => {
        if(!i.poster_path) return;
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<img src="${POSTER + i.poster_path}"><div class="card-info">${i.title || i.name}</div>`;
        card.onclick = () => openItem(i);
        container.appendChild(card);
    });
}

function setHero(i) {
    const h = document.getElementById('hero');
    h.style.backgroundImage = `url(${IMG + i.backdrop_path})`;
    h.innerHTML = `<div class="hero-overlay"></div>
    <div class="hero-body">
        <h1>${i.title || i.name}</h1>
        <p style="color:#eee; font-size:16px; margin: 15px 0; max-width: 600px;">${i.overview.slice(0, 160)}...</p>
        <div class="hero-btns">
            <button class="btn btn-white" onclick='openItem(${JSON.stringify(i).replace(/'/g,"")})'><span>▶</span> Play</button>
            <button class="btn btn-gray"><span>+</span> My List</button>
        </div>
    </div>`;
}

async function openItem(i) {
    activeItem = i;
    const m = document.getElementById('playerModal');
    const f = document.getElementById('mainFrame');
    const playBtn = document.getElementById('mainPlayBtn');
    
    m.style.display = "block";
    document.body.style.overflow = "hidden";

    const type = i.first_air_date ? 'tv' : 'movie';
    const v = await call(`/${type}/${i.id}/videos`);
    const trailer = v.results.find(x => x.type === "Trailer") || v.results[0];
    
    // Autoplay with mute to bypass browser restrictions
    if(trailer) f.src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1&mute=1&modestbranding=1`;

    document.getElementById('meta').innerHTML = `
        <span class="tag">98% Match • 2026 • 18+</span>
        <h2 style="margin:0 0 10px;">${i.title || i.name}</h2>
        <p style="color:#aaa; font-size:15px; line-height:1.6;">${i.overview}</p>
    `;

    playBtn.onclick = () => playFullScreen(i.id, type);

    if(type === 'tv') {
        document.getElementById('tvTools').style.display = 'block';
        loadTV(i.id);
    } else {
        document.getElementById('tvTools').style.display = 'none';
    }
}

async function loadTV(id) {
    const d = await call(`/tv/${id}`);
    const sel = document.getElementById('seasonSelect');
    sel.innerHTML = "";
    d.seasons.forEach(s => { 
        if(s.season_number > 0) sel.innerHTML += `<option value="${s.season_number}">Season ${s.season_number}</option>`; 
    });
    loadEpisodes();
}

async function loadEpisodes() {
    const s = document.getElementById('seasonSelect').value || 1;
    const d = await call(`/tv/${activeItem.id}/season/${s}`);
    const list = document.getElementById('episodeList');
    list.innerHTML = "";
    d.episodes.forEach(e => {
        const div = document.createElement('div');
        div.className = 'ep-row';
        div.onclick = () => playFullScreen(activeItem.id, 'tv', s, e.episode_number);
        div.innerHTML = `<img class="ep-img" src="${POSTER + e.still_path}">
        <div class="ep-meta"><b>${e.episode_number}. ${e.name}</b><p>${e.overview}</p></div>`;
        list.appendChild(div);
    });
}

async function playFullScreen(id, type, s=1, e=1) {
    const f = document.getElementById('mainFrame');
    const box = document.getElementById('vContainer');
    
    if (box.requestFullscreen) await box.requestFullscreen();
    else if (box.webkitRequestFullscreen) await box.webkitRequestFullscreen();

    f.src = type === 'tv' ? `https://vidsync.xyz/embed/tv/${id}/${s}/${e}?autoPlay=true` : `https://vidsync.xyz/embed/movie/${id}?autoPlay=true`;
}

function closeModal() {
    document.getElementById('playerModal').style.display = "none";
    document.getElementById('mainFrame').src = "";
    document.body.style.overflow = "auto";
}

function toggleSearch() {
    const s = document.getElementById('searchView');
    s.style.display = s.style.display === 'block' ? 'none' : 'block';
}

document.getElementById('searchField').oninput = async (e) => {
    const q = e.target.value;
    const res = document.getElementById('searchResults');
    if(q.length > 2) {
        const d = await call(`/search/multi?query=${q}`);
        res.innerHTML = "";
        d.results.forEach(i => {
            if(!i.poster_path) return;
            const c = document.createElement('div');
            c.className = 'card';
            c.innerHTML = `<img src="${POSTER + i.poster_path}"><div class="card-info">${i.title || i.name}</div>`;
            c.onclick = () => { toggleSearch(); openItem(i); };
            res.appendChild(c);
        });
    }
};

window.onscroll = () => {
    const n = document.getElementById('nav');
    window.scrollY > 50 ? n.classList.add('scrolled') : n.classList.remove('scrolled');
};

init();
</script>
</body>
</html>
