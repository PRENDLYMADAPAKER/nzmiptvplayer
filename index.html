<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZM FLIX | Ultra Premium</title>

    <style>
        :root {
            --netflix-red: #e50914;
            --netflix-black: #141414;
            --card-width: 200px;
            --card-height: 112px;
            --transition: all 0.4s cubic-bezier(0.33, 1, 0.68, 1);
        }

        body {
            margin: 0; background: var(--netflix-black);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: white; overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 4%; box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            transition: 0.4s;
        }
        header.scrolled { background: #000; padding: 10px 4%; }
        header h2 { color: var(--netflix-red); margin: 0; font-size: 24px; font-weight: 900; }

        .search-box {
            background: rgba(0,0,0,0.6); border: 1px solid #555;
            padding: 5px 10px; border-radius: 4px; display: flex; align-items: center;
        }
        #search { background: transparent; border: none; color: white; outline: none; width: 120px; transition: 0.3s; }
        #search:focus { width: 200px; }

        /* --- HERO --- */
        .hero {
            height: 75vh; display: flex; align-items: center; padding: 0 4%;
            background-size: cover; background-position: center; position: relative;
        }
        .hero::after {
            content: ""; position: absolute; bottom: 0; left: 0; right: 0;
            height: 50%; background: linear-gradient(to top, var(--netflix-black), transparent);
        }
        .heroContent { position: relative; z-index: 2; max-width: 550px; }
        .hero h1 { font-size: clamp(2rem, 5vw, 3.5rem); margin: 0; text-shadow: 2px 2px 4px #000; }
        
        .play-btn { background: white; color: black; padding: 10px 25px; border-radius: 4px; font-weight: bold; border: none; cursor: pointer; font-size: 1rem; }

        /* --- ROWS & TOP 10 --- */
        .section { padding: 20px 0 10px 4%; }
        .row { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; }
        .row::-webkit-scrollbar { display: none; }

        .top10-card { position: relative; min-width: 240px; height: 135px; display: flex; align-items: flex-end; }
        .top10-num {
            font-size: 140px; font-weight: 900; line-height: 0.7; margin-right: -25px;
            color: #000; -webkit-text-stroke: 2px #777; position: relative; z-index: 1;
        }

        .card {
            min-width: var(--card-width); height: var(--card-height);
            background: #222; border-radius: 4px; overflow: hidden;
            transition: var(--transition); cursor: pointer; position: relative;
        }
        .card:hover { transform: scale(1.15); z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-name {
            position: absolute; bottom: 0; width: 100%; padding: 5px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            font-size: 11px; font-weight: bold; text-align: center;
        }

        /* --- PLAYER SYSTEM --- */
        .player {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: none; overflow-y: auto;
        }
        
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; transition: 0.3s; }
        .video-box iframe { width: 100%; height: 100%; border: none; }

        /* THE LANDSCAPE FIX: Only triggers when class "active-landscape" is added */
        @media screen and (max-width: 900px) and (orientation: portrait) {
            .active-landscape {
                position: fixed; top: 50%; left: 50%;
                width: 100vh; height: 100vw;
                transform: translate(-50%, -50%) rotate(90deg);
                z-index: 3000;
            }
        }

        .details { padding: 25px 5%; }
        .ep-item {
            display: flex; gap: 12px; padding: 10px; background: #1a1a1a;
            margin-bottom: 8px; border-radius: 4px; align-items: center; cursor: pointer;
        }
        .ep-item img { width: 120px; height: 68px; object-fit: cover; border-radius: 2px; }

        .close-player {
            position: fixed; top: 15px; left: 15px; z-index: 4000;
            background: rgba(0,0,0,0.5); color: white; border: none;
            width: 40px; height: 40px; border-radius: 50%; font-size: 20px; cursor: pointer;
        }

        #searchOverlay {
            position: fixed; top: 60px; left: 0; width: 100%; height: 100%;
            background: rgba(20,20,20,0.98); z-index: 1500; display: none; padding: 40px 4%;
        }
        .search-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
    </style>
</head>
<body>

<header id="nav">
    <h2 onclick="location.reload()" style="cursor:pointer">NZM FLIX</h2>
    <div class="search-box">
        <input id="search" placeholder="Search..." autocomplete="off">
    </div>
</header>

<div id="hero" class="hero"></div>

<div class="section"><h3>Top 10 Philippines</h3><div class="row" id="top10"></div></div>
<div class="section"><h3>Anime</h3><div class="row" id="anime"></div></div>
<div class="section"><h3>K-Drama</h3><div class="row" id="kdrama"></div></div>
<div class="section"><h3>Trending Movies</h3><div class="row" id="movies"></div></div>

<div id="searchOverlay"><div class="search-grid" id="searchGrid"></div></div>

<div class="player" id="player">
    <button class="close-player" onclick="closePlayer()">✕</button>
    <div class="video-box" id="vBox">
        <iframe id="mainFrame" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>
    <div class="details" id="pDetails"></div>
    <div id="epList" style="padding: 0 5% 40px"></div>
</div>

<script>
const API = "2f7637ba9b3253a84483afa03480473a";
const IMG = "https://image.tmdb.org/t/p/original";
const THUMB = "https://image.tmdb.org/t/p/w500";

async function get(path) {
    const res = await fetch(`https://api.themoviedb.org/3${path}${path.includes('?') ? '&' : '?'}api_key=${API}`);
    return res.json();
}

async function init() {
    const trend = await get('/trending/all/day?region=PH');
    setHero(trend.results[0]);
    
    // Top 10 PH
    const topRow = document.getElementById('top10');
    trend.results.slice(0,10).forEach((i, idx) => {
        const d = document.createElement('div'); d.className = 'top10-card';
        d.innerHTML = `<span class="top10-num">${idx+1}</span><div class="card" onclick='openPlayer(${JSON.stringify(i).replace(/'/g,"")})'>
            <img src="${THUMB + i.backdrop_path}"><div class="card-name">${i.title || i.name}</div></div>`;
        topRow.appendChild(d);
    });

    render('/discover/tv?with_genres=16&with_original_language=ja', 'anime');
    render('/discover/tv?with_genres=18&with_original_language=ko', 'kdrama');
    render('/movie/popular', 'movies');
}

async function render(path, id) {
    const data = await get(path);
    const row = document.getElementById(id);
    data.results.forEach(i => {
        if(!i.backdrop_path) return;
        const c = document.createElement('div'); c.className = 'card';
        c.innerHTML = `<img src="${THUMB + i.backdrop_path}"><div class="card-name">${i.title || i.name}</div>`;
        c.onclick = () => openPlayer(i);
        row.appendChild(c);
    });
}

function setHero(i) {
    const h = document.getElementById("hero");
    h.style.backgroundImage = `linear-gradient(to right, #141414, transparent), url(${IMG+i.backdrop_path})`;
    h.innerHTML = `<div class="heroContent"><h1>${i.title || i.name}</h1>
        <button class="play-btn" onclick='openPlayer(${JSON.stringify(i).replace(/'/g,"")})'>▶ Play Now</button></div>`;
}

async function openPlayer(i) {
    const p = document.getElementById('player');
    const frame = document.getElementById('mainFrame');
    p.style.display = "block";
    document.getElementById('vBox').classList.remove('active-landscape'); // Keep trailer upright
    
    const type = i.first_air_date ? 'tv' : 'movie';
    const v = await get(`/${type}/${i.id}/videos`);
    const trailer = v.results.find(x => x.type === "Trailer") || v.results[0];
    
    if(trailer) frame.src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1&rel=0`;

    document.getElementById('pDetails').innerHTML = `
        <h2 style="margin:0">${i.title || i.name}</h2>
        <p style="color:#aaa; font-size:14px;">${i.overview}</p>
        <button onclick="startStream(${i.id}, '${type}')" style="background:white; color:black; border:none; padding:15px; width:100%; font-weight:bold; border-radius:4px;">▶ START WATCHING</button>
    `;

    if(type === 'tv') loadEps(i.id); else document.getElementById('epList').innerHTML = "";
}

async function loadEps(id) {
    const data = await get(`/tv/${id}/season/1`);
    const list = document.getElementById('epList');
    list.innerHTML = "<h4>Episodes</h4>";
    data.episodes.forEach(e => {
        const d = document.createElement('div'); d.className = 'ep-item';
        d.onclick = () => startStream(id, 'tv', 1, e.episode_number);
        d.innerHTML = `<img src="${THUMB + e.still_path}"><div><b>${e.episode_number}. ${e.name}</b></div>`;
        list.appendChild(d);
    });
}

function startStream(id, type, s=1, e=1) {
    const frame = document.getElementById('mainFrame');
    document.getElementById('vBox').classList.add('active-landscape'); // Only rotate when streaming
    frame.src = type === 'tv' 
        ? `https://vidsync.xyz/embed/tv/${id}/${s}/${e}?autoPlay=true` 
        : `https://vidsync.xyz/embed/movie/${id}?autoPlay=true`;
}

function closePlayer() {
    document.getElementById('player').style.display = "none";
    document.getElementById('mainFrame').src = "";
    document.getElementById('vBox').classList.remove('active-landscape');
    document.body.style.overflow = "auto";
}

document.getElementById('search').oninput = async (e) => {
    const q = e.target.value;
    const ov = document.getElementById('searchOverlay');
    const grid = document.getElementById('searchGrid');
    if(q.length > 2) {
        ov.style.display = "block";
        const data = await get(`/search/multi?query=${q}`);
        grid.innerHTML = "";
        data.results.forEach(i => {
            if(!i.backdrop_path) return;
            const c = document.createElement('div'); c.className = 'card';
            c.innerHTML = `<img src="${THUMB + i.backdrop_path}"><div class="card-name">${i.title || i.name}</div>`;
            c.onclick = () => { ov.style.display="none"; openPlayer(i); };
            grid.appendChild(c);
        });
    } else ov.style.display = "none";
};

window.onscroll = () => {
    const nav = document.getElementById('nav');
    window.scrollY > 50 ? nav.classList.add('scrolled') : nav.classList.remove('scrolled');
};

init();
</script>
</body>
  </html>
