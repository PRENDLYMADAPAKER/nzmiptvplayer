<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NZM FLIX🇵🇭</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#141414;
 color:white;
 overflow-x:hidden;
}

/* HEADER */
header{
 position:fixed;
 width:100%;
 top:0;
 z-index:100;
 padding:10px 20px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 background:linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
}

input{
 padding:6px 12px;
 border-radius:20px;
 border:none;
 background:#222;
 color:white;
}

/* HERO */
.hero{
 height:70vh;
 display:flex;
 flex-direction:column;
 justify-content:flex-end;
 padding:40px;
 background-size:cover;
 background-position:center;
 position:relative;
}

.hero::after{
 content:"";
 position:absolute;
 bottom:0;
 left:0;
 width:100%;
 height:100%;
 background:linear-gradient(to top,#141414,transparent);
}

.hero h2{
 z-index:2;
 font-size:40px;
 margin:0;
}

.hero p{
 z-index:2;
 max-width:600px;
}

/* SECTIONS */
.section{
 padding:20px;
 margin-top:20px;
}

.grid{
 display:flex;
 gap:10px;
 overflow-x:auto;
}

/* CARD */
.card{
 min-width:160px;
 height:240px;
 position:relative;
 cursor:pointer;
 transition:.4s;
 border-radius:10px;
 overflow:hidden;
}

.card img{
 width:100%;
 height:100%;
 object-fit:cover;
}

/* HOVER EXPAND */
.card:hover{
 transform:scale(1.3);
 z-index:20;
}

/* OVERLAY */
.overlay{
 position:absolute;
 bottom:0;
 width:100%;
 background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
 padding:10px;
 opacity:0;
 transition:.3s;
}

.card:hover .overlay{
 opacity:1;
}

/* PLAYER */
.player{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:black;
 display:none;
 flex-direction:column;
 z-index:999;
 overflow-y:auto;
}

.videoWrapper{
 position:relative;
 width:100%;
 padding-top:56.25%;
}

.videoWrapper iframe{
 position:absolute;
 width:100%;
 height:100%;
}

/* DETAILS */
.details{
 padding:20px;
}

/* EPISODES */
.episodes{
 display:flex;
 flex-direction:column;
 gap:10px;
 padding:20px;
}

.episode-card{
 display:flex;
 gap:10px;
 background:#1f1f1f;
 border-radius:10px;
 overflow:hidden;
 cursor:pointer;
 transition:.3s;
}

.episode-card:hover{
 background:#333;
}

.episode-card img{
 width:140px;
 height:80px;
 object-fit:cover;
}

/* BUTTONS */
.controls{
 padding:10px;
 display:flex;
 gap:10px;
}

button{
 background:#e50914;
 border:none;
 color:white;
 padding:6px 12px;
 border-radius:5px;
 cursor:pointer;
}

/* MOBILE */
@media(max-width:600px){
 .hero{height:50vh;padding:20px}
 .card{min-width:120px;height:180px}
}
</style>
</head>

<body>

<header>
<h3>NZM FLIX</h3>
<input id="search" placeholder="Search">
</header>

<div class="hero" id="hero"></div>

<div class="section"><h3>Trending</h3><div class="grid" id="trending"></div></div>
<div class="section"><h3>Top Rated</h3><div class="grid" id="top"></div></div>
<div class="section"><h3>Action</h3><div class="grid" id="action"></div></div>
<div class="section"><h3>Comedy</h3><div class="grid" id="comedy"></div></div>
<div class="section"><h3>Continue Watching</h3><div class="grid" id="continue"></div></div>

<div class="player" id="player">
<div class="controls">
<button onclick="closePlayer()">Close</button>
<select id="season"></select>
</div>

<div class="videoWrapper">
<iframe id="frame"></iframe>
</div>

<div class="details" id="details"></div>
<div class="episodes" id="episodes"></div>
</div>

 <script>
const API_KEY="2f7637ba9b3253a84483afa03480473a";
const IMG="https://image.tmdb.org/t/p/original";
let current={};

function save(k,d){localStorage.setItem(k,JSON.stringify(d))}
function load(k){return JSON.parse(localStorage.getItem(k)||"[]")}
async function fetchData(u){return (await fetch(u)).json()}

/* LOAD HOME */
async function loadHome(){
 const t=await fetchData(`https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}`);
 const top=await fetchData(`https://api.themoviedb.org/3/movie/top_rated?api_key=${API_KEY}`);
 const action=await fetchData(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=28`);
 const comedy=await fetchData(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=35`);

 display(t.results,"trending");
 display(top.results,"top");
 display(action.results,"action");
 display(comedy.results,"comedy");

 setHero(t.results[0]);
 loadContinue();
}

/* HERO */
function setHero(i){
 const h=document.getElementById("hero");
 h.style.backgroundImage=`url(${IMG+i.backdrop_path})`;
 h.innerHTML=`<h2>${i.title||i.name}</h2><p>${i.overview||""}</p>`;
}

/* DISPLAY */
function display(list,id){
 const c=document.getElementById(id);
 c.innerHTML="";

 list.forEach(i=>{
  if(!i.poster_path)return;

  const d=document.createElement("div");
  d.className="card";

  const year=(i.release_date||i.first_air_date||"").split("-")[0];

  d.innerHTML=`
   <img src="${IMG+i.poster_path}">
   <div class="overlay">
    <b>${i.title||i.name}</b><br>
    ⭐ ${i.vote_average} • ${year}
   </div>
  `;

  d.onclick=()=>openPlayer(i);
  c.appendChild(d);
 });
}

/* PLAYER */
function openPlayer(i){
 current=i;
 document.getElementById("player").style.display="flex";

 const year=(i.release_date||i.first_air_date||"").split("-")[0];

 document.getElementById("details").innerHTML=`
 <h2>${i.title||i.name} (${year||""})</h2>
 <p>${i.overview||""}</p>
 `;

 if(i.media_type==="tv"||i.name){
  document.getElementById("season").style.display="block";
  loadTV(i.id);
 }else{
  document.getElementById("season").style.display="none";
  playMovie(i.id);
 }

 saveContinue(i);
}

/* PLAY */
function playMovie(id){
 document.getElementById("frame").src=`https://vidsrc.to/embed/movie/${id}`;
}

/* TV */
async function loadTV(id){
 const d=await fetchData(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}`);
 const s=document.getElementById("season");
 s.innerHTML="";

 d.seasons.forEach(x=>{
  const o=document.createElement("option");
  o.value=x.season_number;
  o.text="Season "+x.season_number;
  s.appendChild(o);
 });

 s.onchange=()=>loadEpisodes(id,s.value);
 loadEpisodes(id,s.value);
}

async function loadEpisodes(id,sn){
 const d=await fetchData(`https://api.themoviedb.org/3/tv/${id}/season/${sn}?api_key=${API_KEY}`);
 const box=document.getElementById("episodes");
 box.innerHTML="";

 d.episodes.forEach(e=>{
  const b=document.createElement("div");
  b.className="episode-card";

  b.innerHTML=`
   <img src="${e.still_path?IMG+e.still_path:""}">
   <div>
    <b>Ep ${e.episode_number}: ${e.name}</b>
    <p>${e.overview||""}</p>
   </div>
  `;

  b.onclick=()=>{
   document.getElementById("frame").src=
   `https://vidsrc.to/embed/tv/${id}/${sn}/${e.episode_number}`;
  };

  box.appendChild(b);
 });
}

/* CONTINUE */
function saveContinue(i){
 let c=load("cont");
 c=c.filter(x=>x.id!==i.id);
 c.unshift(i);
 save("cont",c.slice(0,10));
 loadContinue();
}

function loadContinue(){
 display(load("cont"),"continue");
}

/* CLOSE */
function closePlayer(){
 document.getElementById("player").style.display="none";
 document.getElementById("frame").src="";
}

/* SEARCH */
document.getElementById("search").addEventListener("input",async e=>{
 const q=e.target.value.trim();
 if(q.length<2){loadHome();return}

 const d=await fetchData(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`);
 display(d.results,"trending");
});

/* INIT */
loadHome();
</script>

</body>
</html>
