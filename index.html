<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="origin">
    <title>NZM FLIX | Premium Cinema</title>
    <style>
        :root { --red: #E50914; --bg: #000000; --card-w: 155px; --card-h: 230px; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow-x: hidden; }
        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(229, 9, 20, 0.2); border-top: 3px solid var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        header { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 15px 5%; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); display: flex; justify-content: space-between; }
        .logo { color: var(--red); font-size: 24px; font-weight: 900; cursor: pointer; }
        .hero { height: 60vh; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding: 40px 5%; position: relative; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg), transparent); }
        .section { padding: 20px 0 0 5%; }
        .row { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0 20px; }
        .row::-webkit-scrollbar { display: none; }
        .card { min-width: var(--card-w); cursor: pointer; transition: 0.3s; }
        .card:hover { transform: scale(1.05); }
        .card-img { width: 100%; height: var(--card-h); object-fit: cover; border-radius: 4px; background: #111; }
        .modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .video-wrap { width: 100%; aspect-ratio: 16/9; background: #111; position: relative; }
        /* CRITICAL: Allowfullscreen must be on the iframe */
        iframe { width: 100%; height: 100%; border: none; }
        .btn-red { background: var(--red); color: white; padding: 12px; border: none; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .server-bar { display: flex; gap: 8px; margin: 15px 0; }
        .server-btn { background: #222; color: #888; border: 1px solid #333; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
        .server-btn.active { background: var(--red); color: white; }
        .close-btn { position: fixed; top: 15px; right: 15px; z-index: 3000; background: rgba(0,0,0,0.5); color: white; border: none; padding: 10px; border-radius: 50%; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<header>
    <div class="logo">NZM FLIX</div>
    <div onclick="document.getElementById('searchView').style.display='block'">🔍</div>
</header>

<div id="hero" class="hero"></div>

<div class="section"><h3>Trending</h3><div class="row" id="trending-row"></div></div>
<div class="section"><h3>Philippines</h3><div class="row" id="ph-row"></div></div>

<div class="modal" id="playerModal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="video-wrap">
        <iframe id="mainFrame" allow="autoplay; fullscreen" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"></iframe>
    </div>
    <div style="padding: 20px;">
        <div id="meta"></div>
        <p style="font-size: 12px; color: #555;">SERVER SWITCHER:</p>
        <div class="server-bar">
            <button class="server-btn active" onclick="changeServer(1, this)">Server 1</button>
            <button class="server-btn" onclick="changeServer(2, this)">Server 2 (Full-Res)</button>
        </div>
        <button class="btn-red" id="playBtn" onclick="startStream()">▶ WATCH NOW</button>
    </div>
</div>

<script>
    const KEY = "2f7637ba9b3253a84483afa03480473a";
    let activeItem = null;
    let currentSrv = 1;

    async function init() {
        const res = await fetch(`https://api.themoviedb.org/3/trending/all/week?api_key=${KEY}`);
        const data = await res.json();
        render(data.results, 'trending-row');
        const ph = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${KEY}&region=PH&with_original_language=tl`);
        const phData = await ph.json();
        render(phData.results, 'ph-row');
        setHero(data.results[0]);
        document.getElementById('loader').style.display = 'none';
    }

    function render(list, id) {
        const el = document.getElementById(id);
        list.forEach(i => {
            if(!i.poster_path) return;
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<img class="card-img" src="https://image.tmdb.org/t/p/w500${i.poster_path}">`;
            div.onclick = () => openModal(i);
            el.appendChild(div);
        });
    }

    function setHero(i) {
        document.getElementById('hero').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${i.backdrop_path})`;
        document.getElementById('hero').innerHTML = `<div class="hero-overlay"></div><div style="position:relative; z-index:10;"><h1>${i.title || i.name}</h1></div>`;
    }

    function openModal(i) {
        activeItem = i;
        document.getElementById('playerModal').style.display = 'block';
        document.getElementById('meta').innerHTML = `<h2>${i.title || i.name}</h2><p>${i.overview}</p>`;
        document.getElementById('mainFrame').src = "";
    }

    function changeServer(n, btn) {
        currentSrv = n;
        document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        startStream();
    }

    function startStream() {
        const type = activeItem.first_air_date ? 'tv' : 'movie';
        const id = activeItem.id;
        let url = "";
        if(currentSrv === 1) {
            url = `https://vidsync.xyz/embed/${type}/${id}${type==='tv'?'/1/1':''}`;
        } else {
            url = `https://vidsrc.me/embed/${type}?tmdb=${id}${type==='tv'?'&sea=1&epi=1':''}`;
        }
        document.getElementById('mainFrame').src = url;
    }

    function closeModal() {
        document.getElementById('playerModal').style.display = 'none';
        document.getElementById('mainFrame').src = "";
    }

    init();
</script>
</body>
</html>
