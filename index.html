<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZM FLIX | Universal Edition</title>
    <style>
        :root { 
            --red: #E50914; 
            --bg: #000000; 
            --card-w: 160px; 
            --card-h: 240px;
            --transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* Responsive Scaling for PC & TV */
        @media (min-width: 1024px) {
            :root { --card-w: 220px; --card-h: 330px; }
            .hero-body h1 { font-size: 4.5rem !important; }
            .section h3 { font-size: 1.6rem !important; }
        }

        body { 
            margin: 0; 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', -apple-system, sans-serif; 
            -webkit-font-smoothing: antialiased; 
            overflow-x: hidden; 
        }

        /* --- NAVIGATION --- */
        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 5%; box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
            transition: var(--transition);
        }
        header.scrolled { background: var(--bg); border-bottom: 1px solid #222; padding: 12px 5%; }
        .logo { color: var(--red); font-size: 28px; font-weight: 900; letter-spacing: -1.5px; cursor: pointer; }

        /* --- HERO --- */
        .hero { 
            height: 85vh; background-size: cover; background-position: center top; 
            position: relative; display: flex; align-items: flex-end; padding: 0 5% 80px; 
        }
        .hero-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(to top, var(--bg) 10%, transparent 60%), 
                        linear-gradient(to right, rgba(0,0,0,0.7), transparent); 
        }
        .hero-body { position: relative; z-index: 10; max-width: 800px; }
        .hero-body h1 { font-size: 2.5rem; margin: 0; font-weight: 800; line-height: 1.1; }
        .hero-btns { display: flex; gap: 12px; margin-top: 25px; }
        
        .btn { 
            padding: 14px 30px; border-radius: 4px; font-weight: bold; border: none; 
            cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 16px;
            transition: 0.2s;
        }
        .btn:hover { opacity: 0.8; transform: scale(1.05); }
        .btn-white { background: white; color: black; }
        .btn-gray { background: rgba(109, 109, 110, 0.7); color: white; backdrop-filter: blur(15px); }

        /* --- GRID/ROWS --- */
        .section { padding: 30px 0 0 5%; }
        .section h3 { font-size: 1.2rem; margin-bottom: 15px; color: #e5e5e5; }
        
        .row { 
            display: flex; gap: 12px; overflow-x: auto; padding-bottom: 25px; 
            scroll-behavior: smooth; scroll-snap-type: x mandatory;
        }
        .row::-webkit-scrollbar { display: none; }

        .card { 
            min-width: var(--card-w); height: var(--card-h); border-radius: 8px; 
            background: #111; overflow: hidden; position: relative; cursor: pointer;
            scroll-snap-align: start; outline: none; border: 2px solid transparent;
            transition: var(--transition);
        }
        
        /* PC Hover & TV Focus States */
        .card:hover, .card:focus { 
            transform: scale(1.08); 
            z-index: 10; 
            border-color: white; 
        }

        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { 
            position: absolute; bottom: 0; width: 100%; padding: 40px 10px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,1));
            font-size: 12px; font-weight: 600; text-align: center; opacity: 0.9;
        }

        /* --- PLAYER MODAL --- */
        .modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; position: sticky; top: 0; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        iframe { width: 100%; height: 100%; border: none; }
        
        .content-details { padding: 30px 5%; max-width: 1000px; margin: 0 auto; }
        .tag { color: #46d369; font-weight: bold; font-size: 14px; margin-bottom: 10px; display: block; }
        
        .close-btn { 
            position: fixed; top: 25px; right: 25px; z-index: 3000; 
            background: rgba(0,0,0,0.6); border: none; color: white; 
            width: 45px; height: 45px; border-radius: 50%; font-size: 22px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* TV EPISODE LIST */
        .ep-selector { padding: 0 5% 100px; max-width: 1000px; margin: 0 auto; }
        .ep-row { 
            display: flex; gap: 20px; padding: 20px; border-radius: 8px;
            border-bottom: 1px solid #222; cursor: pointer; transition: 0.2s;
        }
        .ep-row:hover { background: #1a1a1a; }
        .ep-img { width: 160px; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px; }
        .ep-meta b { font-size: 16px; display: block; margin-bottom: 8px; }

        #searchView { position: fixed; inset: 0; background: var(--bg); z-index: 1500; display: none; padding: 120px 5% 20px; overflow-y: auto; }
    </style>
</head>
<body>

<header id="nav">
    <div class="logo" onclick="location.reload()">NZM FLIX</div>
    <div style="display:flex; gap: 25px; align-items:center;">
        <span onclick="toggleSearch()" style="font-size: 24px; cursor:pointer;">🔍</span>
        <div style="width: 35px; height: 35px; background: #2b93d1; border-radius: 4px;"></div>
    </div>
</header>

<div id="home">
    <div id="hero" class="hero"></div>
    <div class="section"><h3>Trending Now</h3><div class="row" id="top-ph"></div></div>
    <div class="section"><h3>Binge-Worthy K-Dramas</h3><div class="row" id="kdrama"></div></div>
    <div class="section"><h3>Family Movie Night</h3><div class="row" id="kids"></div></div>
    <div class="section"><h3>Action Hits</h3><div class="row" id="asian"></div></div>
</div>

<div id="searchView">
    <input type="text" class="search-input" id="searchField" placeholder="Titles, people, genres..." 
           style="background:#222; border:none; color:white; padding:15px 25px; border-radius:30px; width:100%; max-width:500px; font-size:18px; margin-bottom:40px; outline:none; border: 2px solid transparent;">
    <div class="row" style="flex-wrap: wrap; gap:20px;" id="searchResults"></div>
</div>

<div class="modal" id="playerModal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="video-box" id="vContainer">
        <iframe id="mainFrame" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>
    <div class="content-details" id="meta"></div>
    <div class="ep-selector" id="tvTools">
        <select class="season-dropdown" id="seasonSelect" onchange="loadEpisodes()" 
                style="background:#333; color:white; padding:10px; border-radius:4px; margin-bottom:20px;"></select>
        <div id="episodeList"></div>
    </div>
</div>

<script>
const KEY = "2f7637ba9b3253a84483afa03480473a";
const IMG = "https://image.tmdb.org/t/p/original";
const POSTER = "https://image.tmdb.org/t/p/w500"; // Higher res for TV/PC
let activeItem = null;

async function call(path) {
    try {
        const r = await fetch(`https://api.themoviedb.org/3${path}${path.includes('?') ? '&' : '?'}api_key=${KEY}`);
        return r.json();
    } catch (e) { console.error("API Error", e); }
}

async function init() {
    const ph = await call('/trending/all/day?region=PH');
    setHero(ph.results[0]);
    renderRow('top-ph', ph.results);

    const kd = await call('/discover/tv?with_original_language=ko&with_genres=18');
    renderRow('kdrama', kd.results);

    const kid = await call('/discover/movie?with_genres=16,10751');
    renderRow('kids', kid.results);

    const as = await call('/discover/tv?with_original_language=zh|th');
    renderRow('asian', as.results);
}

function renderRow(id, data) {
    const container = document.getElementById(id);
    data.forEach(i => {
        if(!i.poster_path) return;
        const card = document.createElement('div');
        card.className = 'card';
        card.tabIndex = "0"; // Crucial for TV Navigation
        card.innerHTML = `<img src="${POSTER + i.poster_path}"><div class="card-info">${i.title || i.name}</div>`;
        card.onclick = () => openItem(i);
        // Handle Keyboard "Enter"
        card.onkeydown = (e) => { if(e.key === "Enter") openItem(i); };
        container.appendChild(card);
    });
}

function setHero(i) {
    const h = document.getElementById('hero');
    h.style.backgroundImage = `url(${IMG + i.backdrop_path})`;
    h.innerHTML = `<div class="hero-overlay"></div>
    <div class="hero-body">
        <h1>${i.title || i.name}</h1>
        <p style="color:#eee; font-size:16px; margin: 15px 0; max-width:600px;">${i.overview.slice(0, 160)}...</p>
        <div class="hero-btns">
            <button class="btn btn-white" onclick='openItem(${JSON.stringify(i).replace(/'/g,"")})'><span>▶</span> Play</button>
            <button class="btn btn-gray"><span>+</span> My List</button>
        </div>
    </div>`;
}

async function openItem(i) {
    activeItem = i;
    const m = document.getElementById('playerModal');
    const f = document.getElementById('mainFrame');
    m.style.display = "block";
    document.body.style.overflow = "hidden";

    const type = i.first_air_date ? 'tv' : 'movie';
    const v = await call(`/${type}/${i.id}/videos`);
    const trailer = v.results.find(x => x.type === "Trailer") || v.results[0];
    if(trailer) f.src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1&modestbranding=1`;

    document.getElementById('meta').innerHTML = `
        <span class="tag">98% Match • ${new Date().getFullYear()} • 18+</span>
        <h2 style="margin:0 0 15px; font-size: 2rem;">${i.title || i.name}</h2>
        <p style="color:#aaa; font-size:16px; line-height:1.6; max-width:800px;">${i.overview}</p>
        <button onclick="playFullScreen(${i.id}, '${type}')" style="background:var(--red); color:white; border:none; width:100%; max-width:300px; padding:16px; border-radius:4px; font-weight:bold; margin-top:25px; cursor:pointer;">▶ WATCH FULL CONTENT</button>
    `;

    if(type === 'tv') loadTV(i.id);
    else document.getElementById('tvTools').style.display = 'none';
}

async function loadTV(id) {
    const d = await call(`/tv/${id}`);
    const sel = document.getElementById('seasonSelect');
    document.getElementById('tvTools').style.display = 'block';
    sel.innerHTML = "";
    d.seasons.forEach(s => { if(s.season_number > 0) sel.innerHTML += `<option value="${s.season_number}">Season ${s.season_number}</option>`; });
    loadEpisodes();
}

async function loadEpisodes() {
    const s = document.getElementById('seasonSelect').value || 1;
    const d = await call(`/tv/${activeItem.id}/season/${s}`);
    const list = document.getElementById('episodeList');
    list.innerHTML = "";
    d.episodes.forEach(e => {
        const div = document.createElement('div');
        div.className = 'ep-row';
        div.tabIndex = "0";
        div.onclick = () => playFullScreen(activeItem.id, 'tv', s, e.episode_number);
        div.innerHTML = `<img class="ep-img" src="${e.still_path ? POSTER + e.still_path : 'https://via.placeholder.com/160x90?text=No+Preview'}">
        <div class="ep-meta"><b>${e.episode_number}. ${e.name}</b><p style="color:#999; font-size:13px;">${e.overview || 'No description available.'}</p></div>`;
        list.appendChild(div);
    });
}

async function playFullScreen(id, type, s=1, e=1) {
    const f = document.getElementById('mainFrame');
    const box = document.getElementById('vContainer');
    
    if (box.requestFullscreen) await box.requestFullscreen();
    else if (box.webkitRequestFullscreen) await box.webkitRequestFullscreen();

    // Auto-rotate for mobile
    if (screen.orientation && screen.orientation.lock) {
        try { await screen.orientation.lock('landscape'); } catch(err) { }
    }

    f.src = type === 'tv' ? `https://vidsync.xyz/embed/tv/${id}/${s}/${e}?autoPlay=true` : `https://vidsync.xyz/embed/movie/${id}?autoPlay=true`;
}

function closeModal() {
    document.getElementById('playerModal').style.display = "none";
    document.getElementById('mainFrame').src = "";
    document.body.style.overflow = "auto";
    if (document.fullscreenElement) document.exitFullscreen();
}

// Global Keyboard Listeners (For TV & PC)
document.addEventListener('keydown', (e) => {
    if (e.key === "Escape" || e.key === "Backspace") {
        if(document.getElementById('playerModal').style.display === "block") closeModal();
        if(document.getElementById('searchView').style.display === "block") toggleSearch();
    }
});

function toggleSearch() {
    const s = document.getElementById('searchView');
    const isVisible = s.style.display === 'block';
    s.style.display = isVisible ? 'none' : 'block';
    if(!isVisible) document.getElementById('searchField').focus();
}

document.getElementById('searchField').oninput = async (e) => {
    const q = e.target.value;
    const res = document.getElementById('searchResults');
    if(q.length > 2) {
        const d = await call(`/search/multi?query=${q}`);
        res.innerHTML = "";
        d.results.forEach(i => {
            if(!i.poster_path) return;
            const c = document.createElement('div');
            c.className = 'card';
            c.tabIndex = "0";
            c.innerHTML = `<img src="${POSTER + i.poster_path}"><div class="card-info">${i.title || i.name}</div>`;
            c.onclick = () => { toggleSearch(); openItem(i); };
            res.appendChild(c);
        });
    }
};

window.onscroll = () => {
    const n = document.getElementById('nav');
    window.scrollY > 50 ? n.classList.add('scrolled') : n.classList.remove('scrolled');
};

init();
</script>
</body>
</html>
