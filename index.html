<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>NZM FLIX | Elite TV Edition</title>
    <style>
        :root { 
            --red: #E50914; 
            --blue: #3D82FF;
            --bg: #000; 
            --card-w: clamp(145px, 15vw, 200px); 
            --card-h: calc(var(--card-w) * 1.5);
        }
        
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            overflow-x: hidden; -webkit-tap-highlight-color: transparent; 
        }

        /* TV Focus Highlight - Essential for Remotes */
        [tabindex="0"]:focus {
            outline: 4px solid white !important;
            transform: scale(1.06);
            z-index: 999;
            transition: 0.2s cubic-bezier(0.2, 0, 0.2, 1);
            box-shadow: 0 0 30px var(--red);
        }

        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(229, 9, 20, 0.1); border-top: 4px solid var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        header { position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: space-between; padding: 25px 5%; box-sizing: border-box; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        .logo { color: var(--red); font-size: 32px; font-weight: 900; cursor: pointer; outline: none; }

        .hero { height: 80vh; background: center top/cover; position: relative; display: flex; align-items: flex-end; padding: 0 5% 80px; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 5%, transparent 70%); }
        .hero-body { position: relative; z-index: 10; max-width: 800px; }

        .section { padding: 40px 0 0 5%; }
        .row { display: flex; gap: 20px; overflow-x: auto; padding: 20px 0 40px; scrollbar-width: none; scroll-behavior: smooth; }
        .row::-webkit-scrollbar { display: none; }

        .card { min-width: var(--card-w); width: var(--card-w); cursor: pointer; border-radius: 8px; position: relative; outline: none; transition: 0.3s; }
        .card img { width: 100%; height: var(--card-h); object-fit: cover; border-radius: 8px; background: #111; pointer-events: none; }
        .card-name { font-size: 14px; margin-top: 12px; text-align: center; color: #bbb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-status { position: absolute; top: 12px; right: 12px; background: var(--red); font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: bold; }

        /* MODAL SYSTEM (TV Side-by-Side) */
        .modal { position: fixed; inset: 0; background: #000; z-index: 2500; display: none; }
        .modal-content { display: flex; flex-direction: column; width: 100%; height: 100%; overflow-y: auto; }
        
        @media (min-width: 1024px) {
            .modal-content { flex-direction: row; padding: 50px 5%; gap: 40px; overflow: hidden; }
            .video-side { width: 48%; display: flex; flex-direction: column; gap: 25px; }
            .info-side { flex: 1; height: 85vh; overflow-y: auto; padding-right: 20px; }
            .video-wrap { width: 100%; aspect-ratio: 16/9; border-radius: 15px; overflow: hidden; border: 2px solid #222; }
        }

        .video-wrap { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        .btn-red { background: var(--red); color: white; width: 100%; padding: 18px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 20px; margin-top: 15px; outline: none; }
        .srv-bar { display: flex; gap: 12px; margin: 20px 0; overflow-x: auto; scrollbar-width: none; }
        .srv-btn { background: #1a1a1a; color: #999; padding: 14px 28px; border-radius: 6px; border: 1px solid #333; cursor: pointer; outline: none; white-space: nowrap; }
        .srv-btn.active { background: var(--blue); color: white; border-color: var(--blue); }

        .ep-card { display: flex; gap: 18px; padding: 15px; background: #111; border-radius: 10px; margin-bottom: 12px; cursor: pointer; outline: none; align-items: center; }
        .ep-card.playing { border-left: 6px solid var(--red); background: #1a1a1a; }
        .ep-thumb { width: 150px; aspect-ratio: 16/9; object-fit: cover; border-radius: 6px; background: #222; }
        
        .close-btn { position: fixed; top: 30px; right: 30px; z-index: 3000; background: rgba(40,40,40,0.9); color: white; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 28px; cursor: pointer; outline: none; }

        #searchView { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; padding: 120px 5% 50px; overflow-y: auto; }
        .search-bar { width: 100%; max-width: 700px; display: block; margin: 0 auto 50px; padding: 22px 35px; background: #111; border: 2px solid #333; color: white; border-radius: 60px; font-size: 24px; outline: none; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<header id="nav">
    <div class="logo" tabindex="0" onclick="location.reload()">NZM FLIX</div>
    <div class="search-icon" tabindex="0" onclick="toggleSearch()" style="cursor:pointer; font-size: 30px;">🔍</div>
</header>

<main id="home">
    <div id="hero" class="hero"></div>
    <div class="section" id="lastWatchedSec" style="display:none;">
        <h3>Continue Watching <small onclick="clearHist()" style="color:var(--red); cursor:pointer; margin-left:15px; font-size: 14px;">[Clear]</small></h3>
        <div class="row" id="last-row"></div>
    </div>
    <div class="section"><h3>Top Philippines</h3><div class="row" id="ph-row"></div></div>
    <div class="section"><h3>Trending Now</h3><div class="row" id="trend-row"></div></div>
    <div class="section"><h3>K-Drama Specials</h3><div class="row" id="kdrama-row"></div></div>
    <div class="section"><h3>Asian Cinema</h3><div class="row" id="asian-row"></div></div>
    <div class="section"><h3>Action & Adventure</h3><div class="row" id="action-row"></div></div>
</main>

<div id="searchView">
    <input type="text" id="searchInput" class="search-bar" placeholder="Type to search movies or shows...">
    <div class="row" style="flex-wrap:wrap; justify-content:center; gap: 25px;" id="searchRes"></div>
</div>

<div class="modal" id="pModal">
    <button class="close-btn" tabindex="0" onclick="closeM()">✕</button>
    <div class="modal-content">
        <div class="video-side">
            <div class="video-wrap" id="vidContainer" tabindex="0">
                <iframe id="frame" allowfullscreen allow="autoplay"></iframe>
            </div>
            <div id="meta-main"></div>
        </div>

        <div class="info-side">
            <div id="meta-extra"></div>
            <div class="srv-bar" id="srvContainer">
                <button class="srv-btn active" tabindex="0" onclick="setSrv(1, this)">Server 1</button>
                <button class="srv-btn" tabindex="0" onclick="setSrv(2, this)">Server 2</button>
                <button class="srv-btn" tabindex="0" onclick="setSrv(3, this)">Server 3</button>
            </div>
            <div id="tvUI" style="display:none; margin-top:15px;">
                <h4 style="margin-bottom:12px; color: #888;">SEASON SELECTOR</h4>
                <select id="seasonSelect" tabindex="0" onchange="loadEps()" style="width:100%; padding:18px; background:#1a1a1a; color:white; border:1px solid #333; border-radius:10px; font-size: 18px; outline:none;"></select>
                <div id="epList" style="margin-top:25px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
const KEY = "2f7637ba9b3253a84483afa03480473a", IMG = "https://image.tmdb.org/t/p/original", POSTER = "https://image.tmdb.org/t/p/w500";
let active = null, srv = 1, curEp = {s:1,e:1};

async function api(p) { return (await fetch(`https://api.themoviedb.org/3${p}${p.includes('?')?'&':'?'}api_key=${KEY}`)).json(); }

// --- UNIVERSAL TV NAVIGATION & BACK BUTTON ENGINE ---
document.addEventListener('keydown', (e) => {
    // 1. Universal Back Button Support (Android, LG, Samsung, ESC)
    const backCodes = [8, 27, 461, 10009];
    if (backCodes.includes(e.keyCode)) {
        if (document.getElementById('pModal').style.display === 'block') {
            e.preventDefault();
            closeM();
            return;
        }
        if (document.getElementById('searchView').style.display === 'block') {
            e.preventDefault();
            toggleSearch();
            return;
        }
    }

    // 2. D-Pad Logic
    const focusables = Array.from(document.querySelectorAll('[tabindex="0"]')).filter(el => el.offsetParent !== null);
    if(focusables.length === 0) return;
    let cur = document.activeElement;
    if (!cur || cur === document.body) { focusables[0].focus(); return; }

    let next = null;
    const getC = (el) => { const r = el.getBoundingClientRect(); return { x: r.left + r.width/2, y: r.top + r.height/2 }; };
    const curC = getC(cur);

    if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) {
        e.preventDefault();
        let bestDist = Infinity;
        focusables.forEach(el => {
            if (el === cur) return;
            const elC = getC(el), dx = elC.x - curC.x, dy = elC.y - curC.y;
            let ok = false;
            if (e.key === "ArrowRight" && dx > 10 && Math.abs(dy) < Math.abs(dx)) ok = true;
            if (e.key === "ArrowLeft" && dx < -10 && Math.abs(dy) < Math.abs(dx)) ok = true;
            if (e.key === "ArrowDown" && dy > 10 && Math.abs(dx) < Math.abs(dy)) ok = true;
            if (e.key === "ArrowUp" && dy < -10 && Math.abs(dx) < Math.abs(dy)) ok = true;
            if (ok) {
                const d = Math.sqrt(dx*dx + dy*dy);
                if (d < bestDist) { bestDist = d; next = el; }
            }
        });
    }

    if (next) { 
        next.focus(); 
        next.scrollIntoView({ behavior: "smooth", block: "center", inline: "center" }); 
    }
    
    // 3. OK/Enter Button Logic
    if (e.key === "Enter") { 
        e.preventDefault(); 
        cur.click(); 
    }
});

// --- CORE APP LOGIC ---
async function init() {
    renderHistory();
    const tr = await api('/trending/all/week');
    if(tr.results[0]) setHero(tr.results[0]);
    fill('ph-row', (await api('/trending/all/day?region=PH')).results);
    fill('trend-row', tr.results);
    fill('kdrama-row', (await api('/discover/tv?with_original_language=ko')).results);
    fill('asian-row', (await api('/discover/movie?with_original_language=zh|ja|th')).results);
    fill('action-row', (await api('/discover/movie?with_genres=28')).results);
    document.getElementById('loader').style.display="none";
    setTimeout(() => document.querySelector('.logo').focus(), 500);
}

function fill(id, data) {
    const r = document.getElementById(id); if(!r || !data) return;
    data.forEach(i => {
        if(!i.poster_path) return;
        const c = document.createElement('div'); c.className='card'; c.tabIndex=0;
        c.innerHTML=`<img src="${POSTER+i.poster_path}"><div class="card-name">${i.title||i.name}</div>`;
        c.onclick=() => { curEp={s:1,e:1}; openM(i); };
        r.appendChild(c);
    });
}

function setHero(i) {
    const h = document.getElementById('hero');
    h.style.backgroundImage = `url(${IMG+(i.backdrop_path||i.poster_path)})`;
    h.innerHTML = `<div class="hero-overlay"></div><div class="hero-body"><h1>${i.title||i.name}</h1>
        <button class="btn-red" style="width:auto;padding:15px 50px;" tabindex="0" onclick='openM(${JSON.stringify(i).replace(/'/g,"")})'>WATCH NOW</button></div>`;
}

async function openM(i) {
    active = i;
    const hist = JSON.parse(localStorage.getItem('nzm_history') || '[]');
    const record = hist.find(x => x.id === i.id);
    if(record) curEp = {s: record.lastS || 1, e: record.lastE || 1};

    document.getElementById('pModal').style.display='block';
    document.body.style.overflow='hidden';
    
    const type = i.first_air_date ? 'tv' : 'movie';
    const vData = await api(`/${type}/${i.id}/videos`);
    const trailer = vData.results.find(v => v.type==='Trailer') || vData.results[0];
    document.getElementById('frame').src = trailer ? `https://www.youtube.com/embed/${trailer.key}?autoplay=1&mute=1` : "";

    document.getElementById('meta-main').innerHTML = `
        <h2 style="margin:15px 0;">${i.title||i.name}</h2>
        <button id="playBtn" class="btn-red" tabindex="0" onclick="watch()">🚀 PLAY ${type==='tv'?'S'+curEp.s+':E'+curEp.e:'NOW'}</button>`;
    
    document.getElementById('meta-extra').innerHTML = `<p style="color:#aaa; line-height:1.6; font-size:18px;">${i.overview ? i.overview.slice(0,350) + '...' : 'No description available.'}</p>`;

    if(type === 'tv') {
        document.getElementById('tvUI').style.display='block';
        const d = await api(`/tv/${i.id}`);
        document.getElementById('seasonSelect').innerHTML = d.seasons.filter(s => s.season_number > 0)
            .map(s => `<option value="${s.season_number}" ${s.season_number==curEp.s?'selected':''}>Season ${s.season_number}</option>`).join('');
        loadEps();
    } else document.getElementById('tvUI').style.display='none';
    
    setTimeout(() => document.getElementById('playBtn').focus(), 400);
}

async function loadEps() {
    const s = document.getElementById('seasonSelect').value;
    const d = await api(`/tv/${active.id}/season/${s}`);
    document.getElementById('epList').innerHTML = d.episodes.map(e => `
        <div class="ep-card ${e.episode_number==curEp.e && s==curEp.s?'playing':''}" tabindex="0" onclick="playEp(${s},${e.episode_number})">
            <img class="ep-thumb" src="${e.still_path?POSTER+e.still_path:''}" alt="EP">
            <div><b style="font-size:18px;">${e.episode_number}. ${e.name}</b></div>
        </div>`).join('');
}

function playEp(s, e) { curEp = {s,e}; watch(); }

function watch() {
    saveWatched(active, curEp.s, curEp.e);
    const type = active.first_air_date ? 'tv' : 'movie';
    const id = active.id, { s, e } = curEp;
    
    let url = (srv === 1) ? `https://vidsync.xyz/embed/${type}/${id}${type==='tv'?`/${s}/${e}`:''}` : 
              (srv === 2) ? `https://vidsrc.cc/v2/embed/${type}/${id}${type==='tv'?`/${s}/${e}`:''}` : 
                            `https://vidsrc.pro/embed/${type}/${id}${type==='tv'?`/${s}/${e}`:''}`;

    document.getElementById('frame').src = url;
    document.getElementById('vidContainer').focus();
    
    // Attempt fullscreen if supported
    const vc = document.getElementById('vidContainer');
    if(vc.requestFullscreen) vc.requestFullscreen();
    else if(vc.webkitRequestFullscreen) vc.webkitRequestFullscreen();
}

function saveWatched(i, s=1, e=1) {
    let list = JSON.parse(localStorage.getItem('nzm_history') || '[]');
    list = list.filter(x => x.id !== i.id);
    i.lastS = s; i.lastE = e;
    list.unshift(i);
    localStorage.setItem('nzm_history', JSON.stringify(list.slice(0, 24)));
    renderHistory();
}

function renderHistory() {
    const list = JSON.parse(localStorage.getItem('nzm_history') || '[]');
    const row = document.getElementById('last-row');
    if(list.length > 0) {
        document.getElementById('lastWatchedSec').style.display = 'block';
        row.innerHTML = '';
        list.forEach(i => {
            const c = document.createElement('div'); c.className = 'card'; c.tabIndex = 0;
            c.innerHTML = `<img src="${POSTER+i.poster_path}"><div class="card-status">${i.first_air_date ? 'S'+i.lastS+'E'+i.lastE : 'Movie'}</div><div class="card-name">${i.title||i.name}</div>`;
            c.onclick = () => { curEp = {s:i.lastS||1, e:i.lastE||1}; openM(i); };
            row.appendChild(c);
        });
    } else document.getElementById('lastWatchedSec').style.display = 'none';
}

function clearHist() { if(confirm("Clear watching history?")) { localStorage.removeItem('nzm_history'); renderHistory(); } }
function setSrv(n, b) { srv = n; document.querySelectorAll('.srv-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); if(document.getElementById('frame').src.includes('embed')) watch(); }
function closeM() { document.getElementById('pModal').style.display='none'; document.getElementById('frame').src=''; document.body.style.overflow='auto'; }
function toggleSearch() { 
    const s = document.getElementById('searchView'); 
    const active = s.style.display === 'block';
    s.style.display = active ? 'none' : 'block'; 
    if(!active) document.getElementById('searchInput').focus(); 
}

// Search Logic
document.getElementById('searchInput').oninput = async (e) => {
    const q = e.target.value;
    if(q.length < 2) return;
    const res = await api(`/search/multi?query=${q}`);
    const row = document.getElementById('searchRes');
    row.innerHTML = '';
    res.results.forEach(i => {
        if(!i.poster_path) return;
        const c = document.createElement('div'); c.className='card'; c.tabIndex=0;
        c.innerHTML=`<img src="${POSTER+i.poster_path}"><div class="card-name">${i.title||i.name}</div>`;
        c.onclick=() => { curEp={s:1,e:1}; openM(i); };
        row.appendChild(c);
    });
};

init();
</script>
</body>
</html>
