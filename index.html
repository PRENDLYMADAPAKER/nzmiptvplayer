<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streaming App V2</title><style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0c10;
  color: white;
}

header {
  padding: 15px;
  background: linear-gradient(to right, #111, #000);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

input {
  padding: 10px;
  width: 220px;
  border-radius: 20px;
  border: none;
}

.hero {
  height: 60vh;
  background-size: cover;
  display: flex;
  align-items: flex-end;
  padding: 20px;
  font-size: 24px;
}

.section {
  padding: 10px;
}

.grid {
  display: flex;
  gap: 10px;
  overflow-x: auto;
}

.card {
  min-width: 150px;
  cursor: pointer;
  transition: transform 0.3s;
}

.card:hover {
  transform: scale(1.1);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.player {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  flex-direction: column;
  z-index: 999;
}

.player iframe {
  flex: 1;
  width: 100%;
}

.controls {
  padding: 10px;
  background: #111;
  display: flex;
  gap: 10px;
}

select {
  padding: 5px;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
</style></head><body><header>
  <h2>StreamX</h2>
  <input type="text" id="search" placeholder="Search...">
</header><div class="hero" id="hero"></div><div class="section">
  <h3>Trending</h3>
  <div class="grid" id="trending"></div>
</div><div class="section">
  <h3>Top Rated</h3>
  <div class="grid" id="top"></div>
</div><div class="player" id="player">
  <div class="controls">
    <button onclick="closePlayer()">Close</button>
    <select id="season"></select>
    <select id="episode"></select>
  </div>
  <iframe id="frame" allowfullscreen></iframe>
</div><script>
const API_KEY = "2f7637ba9b3253a84483afa03480473a";
const IMG = "https://image.tmdb.org/t/p/original";

let current = {};

async function fetchData(url) {
  const res = await fetch(url);
  return res.json();
}

async function loadHome() {
  const trending = await fetchData(`https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}`);
  const top = await fetchData(`https://api.themoviedb.org/3/movie/top_rated?api_key=${API_KEY}`);

  display(trending.results, "trending");
  display(top.results, "top");

  setHero(trending.results[0]);
}

function setHero(item) {
  const hero = document.getElementById("hero");
  hero.style.backgroundImage = `url(${IMG + item.backdrop_path})`;
  hero.innerHTML = item.title || item.name;
  hero.onclick = () => openPlayer(item);
}

function display(list, id) {
  const container = document.getElementById(id);
  container.innerHTML = "";

  list.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<img src="${IMG + item.poster_path}"/>`;
    div.onclick = () => openPlayer(item);
    container.appendChild(div);
  });
}

function openPlayer(item) {
  current = item;
  document.getElementById("player").style.display = "flex";

  if (item.media_type === "tv" || item.first_air_date) {
    loadTV(item.id);
  } else {
    playSources([`https://vidsync.xyz/embed/movie/${item.id}`,
                 `https://vidsrc.to/embed/movie/${item.id}`]);
  }
}

function playSources(sources) {
  let i = 0;
  const frame = document.getElementById("frame");

  function tryNext() {
    if (i >= sources.length) return;
    frame.src = sources[i];
    i++;

    setTimeout(() => {
      tryNext();
    }, 5000);
  }

  tryNext();
}

async function loadTV(id) {
  const data = await fetchData(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}`);

  const seasonSelect = document.getElementById("season");
  const episodeSelect = document.getElementById("episode");

  seasonSelect.innerHTML = "";

  data.seasons.forEach(s => {
    const opt = document.createElement("option");
    opt.value = s.season_number;
    opt.text = "Season " + s.season_number;
    seasonSelect.appendChild(opt);
  });

  seasonSelect.onchange = () => loadEpisodes(id, seasonSelect.value);
  loadEpisodes(id, seasonSelect.value);
}

async function loadEpisodes(id, season) {
  const data = await fetchData(`https://api.themoviedb.org/3/tv/${id}/season/${season}?api_key=${API_KEY}`);

  const episodeSelect = document.getElementById("episode");
  episodeSelect.innerHTML = "";

  data.episodes.forEach(e => {
    const opt = document.createElement("option");
    opt.value = e.episode_number;
    opt.text = "Ep " + e.episode_number;
    episodeSelect.appendChild(opt);
  });

  episodeSelect.onchange = () => playEpisode(id, season, episodeSelect.value);
  playEpisode(id, season, episodeSelect.value);
}

function playEpisode(id, season, ep) {
  playSources([
    `https://vidsync.xyz/embed/tv/${id}/${season}/${ep}`,
    `https://vidsrc.to/embed/tv/${id}/${season}/${ep}`
  ]);
}

function closePlayer() {
  document.getElementById("player").style.display = "none";
  document.getElementById("frame").src = "";
}

loadHome();
</script></body>
</html>
