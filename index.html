<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>NZM FLIX | Elite TV Edition</title>
    <style>
        :root { 
            --red: #E50914; --bg: #000; 
            --card-w: clamp(160px, 18vw, 240px); 
            --card-h: calc(var(--card-w) * 1.5);
            --safe-zone: 60px; /* Prevents TV Overscan clipping */
        }
        body { 
            margin: 0; 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; /* Prevent body scroll on TV */
            -webkit-tap-highlight-color: transparent; 
        }

        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; transition: 0.6s; }
        .spinner { width: 60px; height: 60px; border: 5px solid rgba(229, 9, 20, 0.1); border-top: 5px solid var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            display: flex; justify-content: space-between; 
            padding: 30px var(--safe-zone); box-sizing: border-box; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); 
            transition: 0.3s; 
        }
        header.scrolled { background: var(--bg); border-bottom: 1px solid #222; }
        .logo { color: var(--red); font-size: 32px; font-weight: 900; cursor: pointer; outline: none; }

        /* Enhanced TV Focus States */
        [tabindex="0"]:focus {
            outline: 4px solid #ffffff !important;
            transform: scale(1.1) !important;
            z-index: 999 !important;
            box-shadow: 0 0 30px rgba(229, 9, 20, 0.6);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hero { height: 80vh; background: center top/cover; position: relative; display: flex; align-items: flex-end; padding: 0 var(--safe-zone) 80px; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 10%, transparent 80%), linear-gradient(to right, rgba(0,0,0,0.8), transparent); }
        .hero-body { position: relative; z-index: 10; max-width: 800px; }
        .hero-body h1 { font-size: clamp(2.5rem, 7vw, 4.5rem); margin: 0; font-weight: 800; text-shadow: 2px 2px 15px rgba(0,0,0,1); }

        .section { padding: 40px 0 0 var(--safe-zone); }
        .section h3 { font-size: 1.6rem; margin-bottom: 15px; color: #e5e5e5; font-weight: 600; }
        .row { display: flex; gap: 20px; overflow-x: auto; padding: 20px 0 40px; scrollbar-width: none; scroll-behavior: smooth; }
        .row::-webkit-scrollbar { display: none; }

        .card { min-width: var(--card-w); width: var(--card-w); cursor: pointer; border-radius: 8px; transition: 0.3s; position: relative; outline: none; }
        .card img { width: 100%; height: var(--card-h); object-fit: cover; border-radius: 8px; background: #111; pointer-events: none; }
        .card-name { font-size: 15px; margin-top: 12px; text-align: center; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        .card-status { position: absolute; top: 12px; right: 12px; background: var(--red); font-size: 11px; padding: 4px 8px; border-radius: 4px; font-weight: bold; z-index: 5; }

        .modal { position: fixed; inset: 0; background: #000; z-index: 2500; display: none; overflow-y: auto; }
        .modal-content { display: flex; flex-direction: column; width: 100%; min-height: 100vh; }
        
        @media (min-width: 1024px) {
            .modal-content { flex-direction: row-reverse; padding: 80px var(--safe-zone); gap: 50px; }
            .video-wrap { width: 60% !important; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
            .info-wrap { flex: 1; height: 80vh; overflow-y: auto; scrollbar-width: none; }
        }

        .video-wrap { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        .btn-red { background: var(--red); color: white; width: 100%; padding: 18px; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 18px; margin-top: 20px; outline: none; text-transform: uppercase; }
        .srv-bar { display: flex; gap: 12px; margin: 20px 0; overflow-x: auto; scrollbar-width: none; }
        .srv-btn { background: #222; color: #aaa; padding: 12px 24px; border-radius: 6px; border: 1px solid #333; cursor: pointer; outline: none; font-weight: 600; white-space: nowrap; }
        .srv-btn.active { background: var(--red); color: white; border-color: var(--red); }

        .ep-card { display: flex; gap: 20px; padding: 15px; background: #111; border-radius: 10px; margin-bottom: 12px; cursor: pointer; outline: none; align-items: center; }
        .ep-card.playing { border-left: 5px solid var(--red); background: #1a1a1a; }
        .ep-thumb { width: 160px; aspect-ratio: 16/9; object-fit: cover; border-radius: 6px; background: #222; }
        
        .close-btn { position: fixed; top: 30px; right: var(--safe-zone); z-index: 3000; background: rgba(255,255,255,0.1); color: white; border: none; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; font-size: 26px; backdrop-filter: blur(10px); }

        #searchView { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; padding: 120px var(--safe-zone) 50px; overflow-y: auto; }
        .search-bar { width: 100%; max-width: 800px; display: block; margin: 0 auto 50px; padding: 20px 35px; background: #1a1a1a; border: 2px solid #333; color: white; border-radius: 60px; font-size: 22px; outline: none; }

        /* TV Row Alignment */
        .row:focus-within { scroll-behavior: smooth; }
        .row .card { scroll-snap-align: start; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<header id="nav">
    <div class="logo" tabindex="0" onclick="location.reload()">NZM FLIX</div>
    <div class="search-icon" tabindex="0" onclick="toggleSearch()" style="cursor:pointer; font-size: 28px; padding: 5px;">🔍</div>
</header>

<main id="home" style="margin-bottom: 100px;">
    <div id="hero" class="hero"></div>
    
    <div class="section" id="lastWatchedSec" style="display:none;">
        <h3>Last Watched <small onclick="clearHist()" style="font-size:14px; color:var(--red); cursor:pointer; margin-left:15px; opacity:0.7;">[Clear Hist]</small></h3>
        <div class="row" id="last-row"></div>
    </div>
    
    <div class="section"><h3>Top Philippines</h3><div class="row" id="ph-row"></div></div>
    <div class="section"><h3>Trending Now</h3><div class="row" id="trend-row"></div></div>
    <div class="section"><h3>K-Drama</h3><div class="row" id="kdrama-row"></div></div>
    <div class="section"><h3>Asian</h3><div class="row" id="asian-row"></div></div>
    <div class="section"><h3>Comedy</h3><div class="row" id="comedy-row"></div></div>
    <div class="section"><h3>Action</h3><div class="row" id="action-row"></div></div>
    <div class="section"><h3>Sci-Fi</h3><div class="row" id="scifi-row"></div></div>
    <div class="section"><h3>Anime</h3><div class="row" id="anime-row"></div></div>
    <div class="section"><h3>Kids & Family</h3><div class="row" id="kids-row"></div></div>
</main>

<div id="searchView">
    <input type="text" id="searchInput" class="search-bar" placeholder="Search movies or shows...">
    <div class="row" style="flex-wrap:wrap; justify-content:center; gap: 25px;" id="searchRes"></div>
</div>

<div class="modal" id="pModal">
    <button class="close-btn" onclick="closeM()">✕</button>
    <div class="modal-content">
        <div class="video-wrap" id="vidContainer" tabindex="0">
            <iframe id="frame" allowfullscreen allow="autoplay"></iframe>
        </div>
        <div class="info-wrap" style="padding: 20px;">
            <div id="meta"></div>
            <div class="srv-bar">
                <button class="srv-btn active" tabindex="0" onclick="setSrv(1, this)">Server 1</button>
                <button class="srv-btn" tabindex="0" onclick="setSrv(2, this)">Server 2</button>
                <button class="srv-btn" tabindex="0" onclick="setSrv(3, this)">Server 3</button>
                <button class="srv-btn" tabindex="0" onclick="setSrv(4, this)">Server 4</button>
            </div>
            <div id="tvUI" style="display:none; margin-top:30px;">
                <select id="seasonSelect" onchange="loadEps()" tabindex="0" style="width:100%; padding:18px; background:#222; color:white; border:none; border-radius:10px; font-size:16px;"></select>
                <div id="epList" style="margin-top:25px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
const KEY = "2f7637ba9b3253a84483afa03480473a", IMG = "https://image.tmdb.org/t/p/original", POSTER = "https://image.tmdb.org/t/p/w500";
let active = null, srv = 1, curEp = {s:1,e:1}, lastFocus = null;

async function api(p) { try { return (await fetch(`https://api.themoviedb.org/3${p}${p.includes('?')?'&':'?'}api_key=${KEY}`)).json(); } catch(e) { return {results:[]}; } }

// --- TV REMOTE & NAVIGATION ENGINE ---
const TV_KEYS = {
    UP: 38, DOWN: 40, LEFT: 37, RIGHT: 39, ENTER: 13, 
    BACK: [8, 27, 461, 10009, 166], // Standard, LG, Samsung, Android
    PLAY: [415, 19, 10252], PAUSE: [19, 10252]
};

document.addEventListener('keydown', (e) => {
    // 1. Handle Back Button (Crucial for TV apps)
    if (TV_KEYS.BACK.includes(e.keyCode)) {
        e.preventDefault();
        if (document.getElementById('searchView').style.display === 'block') closeSearch();
        else if (document.getElementById('pModal').style.display === 'block') closeM();
        return;
    }

    // 2. Spatial Navigation Logic
    const focusables = Array.from(document.querySelectorAll('[tabindex="0"]')).filter(el => el.offsetParent !== null);
    let current = document.activeElement;
    if (!current || current === document.body) { focusables[0]?.focus(); return; }

    const curRect = current.getBoundingClientRect();
    let next = null;
    let minDistance = Infinity;

    if ([37, 38, 39, 40].includes(e.keyCode)) {
        e.preventDefault();
        focusables.forEach(target => {
            if (target === current) return;
            const tarRect = target.getBoundingClientRect();
            
            const dx = tarRect.left + tarRect.width / 2 - (curRect.left + curRect.width / 2);
            const dy = tarRect.top + tarRect.height / 2 - (curRect.top + curRect.height / 2);
            const distance = Math.sqrt(dx * dx + dy * dy);

            // Directional Filtering
            if (e.keyCode === 39 && dx > 10 && Math.abs(dy) < Math.abs(dx)) { // Right
                if (distance < minDistance) { minDistance = distance; next = target; }
            } else if (e.keyCode === 37 && dx < -10 && Math.abs(dy) < Math.abs(dx)) { // Left
                if (distance < minDistance) { minDistance = distance; next = target; }
            } else if (e.keyCode === 40 && dy > 10 && Math.abs(dx) < Math.abs(dy)) { // Down
                if (distance < minDistance) { minDistance = distance; next = target; }
            } else if (e.keyCode === 38 && dy < -10 && Math.abs(dx) < Math.abs(dy)) { // Up
                if (distance < minDistance) { minDistance = distance; next = target; }
            }
        });

        if (next) {
            next.focus();
            // TV Scroll behavior: Keep focused row in view
            next.scrollIntoView({ behavior: "smooth", block: "center", inline: "center" });
        }
    }

    if (e.keyCode === 13) {
        current.click();
    }
});

// --- CORE APP LOGIC ---

function saveWatched(i, s = 1, e = 1) {
    let list = JSON.parse(localStorage.getItem('nzm_history') || '[]');
    list = list.filter(x => x.id !== i.id);
    i.lastS = s; i.lastE = e; i.timestamp = Date.now();
    list.unshift(i);
    localStorage.setItem('nzm_history', JSON.stringify(list.slice(0, 20)));
    renderHistory();
}

function renderHistory() {
    const list = JSON.parse(localStorage.getItem('nzm_history') || '[]');
    const row = document.getElementById('last-row');
    if(list.length > 0) {
        document.getElementById('lastWatchedSec').style.display = 'block';
        row.innerHTML = '';
        list.forEach(i => {
            const c = document.createElement('div'); c.className = 'card'; c.tabIndex = 0;
            const label = i.first_air_date ? `S${i.lastS}:E${i.lastE}` : 'Movie';
            c.innerHTML = `<img src="${POSTER+i.poster_path}"><div class="card-status">${label}</div><div class="card-name">${i.title||i.name}</div>`;
            c.onclick = () => { curEp = {s:i.lastS||1,e:i.lastE||1}; openM(i); };
            row.appendChild(c);
        });
    } else document.getElementById('lastWatchedSec').style.display='none';
}

function clearHist(){ if(confirm("Clear history?")){ localStorage.removeItem('nzm_history'); renderHistory(); } }

async function init(){
    renderHistory();
    const tr = await api('/trending/all/week');
    setHero(tr.results[0]);
    fill('ph-row', (await api('/trending/all/day?region=PH')).results);
    fill('trend-row', tr.results);
    fill('kdrama-row', (await api('/discover/tv?with_original_language=ko&sort_by=popularity.desc')).results);
    fill('asian-row', (await api('/discover/tv?with_original_language=zh|ja|th&sort_by=popularity.desc')).results);
    fill('comedy-row', (await api('/discover/movie?with_genres=35')).results);
    fill('action-row', (await api('/discover/movie?with_genres=28')).results);
    fill('scifi-row', (await api('/discover/movie?with_genres=878')).results);
    fill('anime-row', (await api('/discover/tv?with_genres=16&with_original_language=ja')).results);
    fill('kids-row', (await api('/discover/movie?with_genres=10751')).results);
    
    document.getElementById('loader').style.display="none";
    document.querySelector('.logo').focus();
}

function fill(id,data){ const r=document.getElementById(id); if(r) data.forEach(i=>fillItem(r,i)); }
function fillItem(r,i){ 
    if(!i.poster_path) return;
    const c=document.createElement('div'); c.className='card'; c.tabIndex=0;
    c.innerHTML=`<img src="${POSTER+i.poster_path}"><div class="card-name">${i.title||i.name}</div>`;
    c.onclick=()=>{ lastFocus = c; curEp={s:1,e:1}; openM(i); };
    r.appendChild(c);
}

function setHero(i){
    const h=document.getElementById('hero');
    h.style.backgroundImage=`url(${IMG+(i.backdrop_path||i.poster_path)})`;
    h.innerHTML=`<div class="hero-overlay"></div><div class="hero-body">
        <h1>${i.title||i.name}</h1>
        <p style="color:#ccc;margin:20px 0;line-height:1.6;font-size:18px;">${i.overview.slice(0,180)}...</p>
        <button class="btn-red" style="width:auto;padding:15px 50px;" tabindex="0" onclick='openM(${JSON.stringify(i).replace(/'/g,"")})'>WATCH NOW</button>
    </div>`;
}

async function openM(i){
    active=i;
    const hist=JSON.parse(localStorage.getItem('nzm_history')||'[]');
    const record=hist.find(x=>x.id===i.id);
    if(record) curEp={s:record.lastS,e:record.lastE};

    document.getElementById('pModal').style.display='block';
    const type=i.first_air_date?'tv':'movie';
    const vData=await api(`/${type}/${i.id}/videos`);
    const trailer=vData.results.find(v=>v.site==='YouTube'&&(v.type==='Trailer'||v.type==='Teaser'))||vData.results[0];

    const frame=document.getElementById('frame');
    frame.src = trailer ? `https://www.youtube.com/embed/${trailer.key}?autoplay=1&rel=0` : "";

    const btnLabel=type==='tv'?`RESUME S${curEp.s}:E${curEp.e}`:`PLAY MOVIE`;
    document.getElementById('meta').innerHTML=`<h1 style="margin:0;font-size:2.2rem;">${i.title||i.name}</h1>
        <p style="color:#aaa;margin:15px 0;font-size:16px;line-height:1.6;">${i.overview}</p>
        <button class="btn-red" id="playBtn" tabindex="0" onclick="watch()">🚀 ${btnLabel}</button>`;

    if(i.first_air_date){
        document.getElementById('tvUI').style.display='block';
        const d=await api(`/tv/${i.id}`);
        document.getElementById('seasonSelect').innerHTML=d.seasons.filter(s=>s.season_number>0)
            .map(s=>`<option value="${s.season_number}" ${s.season_number==curEp.s?'selected':''}>Season ${s.season_number}</option>`).join('');
        await loadEps();
    } else document.getElementById('tvUI').style.display='none';

    document.getElementById('playBtn').focus();
}

async function loadEps(){
    const s=document.getElementById('seasonSelect').value;
    const d=await api(`/tv/${active.id}/season/${s}`);
    const epList=document.getElementById('epList');
    epList.innerHTML=d.episodes.map(e=>`
        <div class="ep-card ${e.episode_number==curEp.e && s==curEp.s?'playing':''}" tabindex="0" onclick="playEp(${s},${e.episode_number})">
            <img class="ep-thumb" src="${e.still_path?POSTER+e.still_path:''}">
            <div style="flex:1"><b>${e.episode_number}. ${e.name}</b></div>
        </div>
    `).join('');
}

function playEp(s,e){ curEp={s,e}; watch(); }

function watch(){
    saveWatched(active,curEp.s,curEp.e);
    const type = active.first_air_date ? 'tv' : 'movie';
    const { s, e } = curEp;
    let url = "";

    if(srv === 1) url = `https://vidsync.xyz/embed/${type}/${active.id}${type==='tv'?`/${s}/${e}`:''}`;
    else if(srv === 2) url = `https://vidsrc.cc/v2/embed/${type}/${active.id}${type==='tv'?`/${s}/${e}`:''}`;
    else if(srv === 3) url = `https://multiembed.mov/?video_id=${active.id}&tmdb=1${type==='tv'?`&s=${s}&e=${e}`:''}`;
    else url = `https://vidsrc.pro/embed/${type}/${active.id}${type==='tv'?`/${s}/${e}`:''}`;

    document.getElementById('frame').src = url;
    document.getElementById('vidContainer').focus();
}

function setSrv(n,b){
    srv=n;
    document.querySelectorAll('.srv-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    if(!document.getElementById('frame').src.includes('youtube')) watch();
}

function toggleSearch(){
    const s=document.getElementById('searchView');
    if(s.style.display!=='block'){ 
        lastFocus = document.activeElement;
        s.style.display='block'; 
        document.getElementById('searchInput').focus(); 
    } else closeSearch();
}

document.getElementById('searchInput').oninput=async (e)=>{
    if(e.target.value.length<3){ document.getElementById('searchRes').innerHTML=''; return; }
    const d=await api(`/search/multi?query=${e.target.value}`);
    const r=document.getElementById('searchRes'); r.innerHTML='';
    d.results.forEach(i=>{ if(i.poster_path){ 
        fillItem(r,i); 
        r.lastChild.onclick=()=>{ closeSearch(); openM(i); }; 
    }});
};

function closeM(){
    document.getElementById('pModal').style.display='none';
    document.getElementById('frame').src='';
    if(lastFocus) lastFocus.focus();
}

function closeSearch(){ 
    document.getElementById('searchView').style.display='none'; 
    if(lastFocus) lastFocus.focus();
}

window.onscroll=()=>document.getElementById('nav').classList.toggle('scrolled',window.scrollY>50);

init();

</script>
</body>
</html>
