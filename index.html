<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NZM FLIX | Ultra Premium</title>

    <style>
        :root {
            --netflix-red: #e50914;
            --netflix-black: #141414;
            --transition: all 0.5s cubic-bezier(0.33, 1, 0.68, 1);
        }

        body {
            margin: 0; background: var(--netflix-black);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: white; overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 4%; box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            transition: 0.4s;
        }
        header.scrolled { background: #000; padding: 12px 4%; }
        header h2 { color: var(--netflix-red); margin: 0; font-size: 28px; font-weight: 900; }

        /* --- HERO --- */
        .hero {
            height: 85vh; display: flex; align-items: center; padding: 0 4%;
            background-size: cover; background-position: center 20%; position: relative;
        }
        .hero::after {
            content: ""; position: absolute; bottom: 0; left: 0; right: 0;
            height: 40%; background: linear-gradient(to top, var(--netflix-black), transparent);
        }
        .heroContent { position: relative; z-index: 2; max-width: 600px; }
        .hero h1 { font-size: clamp(2.5rem, 5vw, 4rem); margin: 0; text-shadow: 2px 2px 4px #000; }

        .btn { padding: 12px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; border: none; font-size: 1rem; }
        .play-btn { background: white; color: black; }
        .info-btn { background: rgba(109, 109, 110, 0.7); color: white; margin-left: 10px; }

        /* --- CARDS & NAMES --- */
        .section { padding: 25px 0 10px 4%; }
        .row { display: flex; gap: 10px; overflow-x: auto; padding: 25px 0; }
        .row::-webkit-scrollbar { display: none; }

        .card {
            min-width: 260px; height: 146px; background: #222;
            border-radius: 4px; position: relative; cursor: pointer;
            transition: var(--transition); overflow: hidden;
        }
        .card:hover { transform: scale(1.3); z-index: 10; box-shadow: 0 10px 25px #000; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-name {
            position: absolute; bottom: 0; width: 100%; padding: 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            font-size: 13px; font-weight: bold; box-sizing: border-box;
            opacity: 1; transition: 0.3s;
        }

        /* --- ADVANCED PLAYER (AUTO LANDSCAPE) --- */
        .player {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--netflix-black); z-index: 2000; display: none; overflow-y: auto;
        }

        .video-container { position: relative; width: 100%; background: black; }
        
        /* Forces landscape feel on mobile */
        @media screen and (max-width: 900px) and (orientation: portrait) {
            .video-container {
                height: 100vw; width: 100vh;
                transform: rotate(90deg); transform-origin: bottom left;
                position: absolute; top: -100vw; left: 0;
            }
        }

        .video-container iframe { width: 100%; aspect-ratio: 16/9; border: none; }

        .trailer-bg {
            width: 100%; height: 400px; background: #000;
            margin-bottom: 20px; position: relative;
        }
        .trailer-bg iframe { pointer-events: none; width: 100%; height: 100%; border: none; }

        .details { padding: 20px 5%; }
        .episode {
            display: flex; gap: 15px; padding: 10px; background: #1a1a1a;
            margin-bottom: 8px; border-radius: 4px; cursor: pointer;
        }
        .episode:hover { background: #333; }
        .episode img { width: 140px; height: 80px; object-fit: cover; }

        /* SEARCH */
        #searchOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1500; display: none;
            padding: 100px 5%; box-sizing: border-box;
        }
        .search-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }

    </style>
</head>
<body>

<header id="nav">
    <h2 onclick="location.reload()" style="cursor:pointer">NZM FLIX</h2>
    <input id="search" placeholder="Search..." style="padding:8px; border-radius:4px; border:1px solid #444; background:#000; color:white;">
</header>

<div id="hero" class="hero"></div>

<div class="section"><h3>Top 10 Philippines</h3><div class="row" id="top10"></div></div>
<div class="section"><h3>Anime Classics</h3><div class="row" id="anime"></div></div>
<div class="section"><h3>K-Drama Favorites</h3><div class="row" id="kdrama"></div></div>
<div class="section"><h3>Asian Action</h3><div class="row" id="asian"></div></div>

<div id="searchOverlay"><div class="search-grid" id="searchGrid"></div></div>

<div class="player" id="player">
    <div id="mediaArea">
        <div class="video-container" id="videoWrapper">
            <iframe id="mainFrame" allow="autoplay; fullscreen"></iframe>
        </div>
    </div>
    <button onclick="closePlayer()" style="position:fixed; top:20px; left:20px; z-index:3000; background:rgba(0,0,0,0.6); color:white; border:none; padding:10px 15px; border-radius:50%; cursor:pointer;">✕</button>
    
    <div class="details" id="playerDetails"></div>
    <div style="padding: 0 5%"><select id="season" style="background:#333; color:white; padding:10px; display:none;"></select></div>
    <div id="episodes" style="padding: 20px 5%"></div>
</div>

<script>
const API = "2f7637ba9b3253a84483afa03480473a";
const IMG = "https://image.tmdb.org/t/p/original";
const THUMB = "https://image.tmdb.org/t/p/w500";

async function fetchURL(url) { return (await fetch(url)).json(); }

async function init() {
    const trend = await fetchURL(`https://api.themoviedb.org/3/trending/all/day?api_key=${API}`);
    setHero(trend.results[0]);
    
    // Rows
    display(trend.results.slice(0,10), "top10", true);
    display((await fetchURL(`https://api.themoviedb.org/3/discover/tv?api_key=${API}&with_genres=16&with_original_language=ja`)).results, "anime");
    display((await fetchURL(`https://api.themoviedb.org/3/discover/tv?api_key=${API}&with_genres=18&with_original_language=ko`)).results, "kdrama");
    display((await fetchURL(`https://api.themoviedb.org/3/discover/movie?api_key=${API}&with_origin_country=PH|HK|KR`)).results, "asian");
}

function setHero(i) {
    const h = document.getElementById("hero");
    h.style.backgroundImage = `linear-gradient(to right, #141414, transparent), url(${IMG+i.backdrop_path})`;
    h.innerHTML = `<div class="heroContent"><h1>${i.title || i.name}</h1><p>${i.overview.slice(0,150)}...</p>
        <button class="btn play-btn" onclick='openPlayer(${JSON.stringify(i).replace(/'/g,"")})'>▶ Play</button></div>`;
}

function display(list, id, isTop10 = false) {
    const row = document.getElementById(id);
    list.forEach((i, idx) => {
        if(!i.backdrop_path) return;
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <img src="${THUMB + i.backdrop_path}">
            <div class="card-name">${i.title || i.name}</div>
        `;
        card.onclick = () => openPlayer(i);
        row.appendChild(card);
    });
}

async function openPlayer(i) {
    const p = document.getElementById("player");
    p.style.display = "block";
    document.body.style.overflow = "hidden";
    
    // Get Trailer
    const type = i.first_air_date ? "tv" : "movie";
    const videos = await fetchURL(`https://api.themoviedb.org/3/${type}/${i.id}/videos?api_key=${API}`);
    const trailer = videos.results.find(v => v.type === "Trailer") || videos.results[0];
    
    // Auto-play Trailer Muted
    if(trailer) {
        document.getElementById("mainFrame").src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1&mute=1&controls=0&loop=1&playlist=${trailer.key}`;
    }

    document.getElementById("playerDetails").innerHTML = `
        <h2>${i.title || i.name}</h2>
        <p>${i.overview}</p>
        <button class="btn play-btn" onclick="actualPlay(${i.id}, '${type}')">▶ Start Full ${type==='tv'?'Series':'Movie'}</button>
    `;

    if(type === 'tv') loadTV(i.id);
}

function actualPlay(id, type, s=1, e=1) {
    const frame = document.getElementById("mainFrame");
    frame.src = type === 'tv' 
        ? `https://vidsync.xyz/embed/tv/${id}/${s}/${e}?autoPlay=true` 
        : `https://vidsync.xyz/embed/movie/${id}?autoPlay=true`;
}

async function loadTV(id) {
    const data = await fetchURL(`https://api.themoviedb.org/3/tv/${id}?api_key=${API}`);
    const sSelect = document.getElementById("season");
    sSelect.style.display = "block"; sSelect.innerHTML = "";
    data.seasons.forEach(s => {
        if(s.season_number === 0) return;
        const opt = document.createElement("option");
        opt.value = s.season_number; opt.text = "Season " + s.season_number;
        sSelect.appendChild(opt);
    });
    sSelect.onchange = () => loadEpisodes(id, sSelect.value);
    loadEpisodes(id, 1);
}

async function loadEpisodes(id, sNum) {
    const data = await fetchURL(`https://api.themoviedb.org/3/tv/${id}/season/${sNum}?api_key=${API}`);
    const box = document.getElementById("episodes");
    box.innerHTML = "";
    data.episodes.forEach(e => {
        const div = document.createElement("div");
        div.className = "episode";
        div.onclick = () => actualPlay(id, 'tv', sNum, e.episode_number);
        div.innerHTML = `<img src="${THUMB+e.still_path}"><div><b>${e.episode_number}. ${e.name}</b></div>`;
        box.appendChild(div);
    });
}

function closePlayer() {
    document.getElementById("player").style.display = "none";
    document.getElementById("mainFrame").src = "";
    document.body.style.overflow = "auto";
}

// Search
document.getElementById("search").oninput = async (e) => {
    const q = e.target.value;
    const ov = document.getElementById("searchOverlay");
    const grid = document.getElementById("searchGrid");
    if(q.length > 2) {
        ov.style.display = "block";
        const data = await fetchURL(`https://api.themoviedb.org/3/search/multi?api_key=${API}&query=${q}`);
        grid.innerHTML = "";
        data.results.forEach(i => {
            if(!i.backdrop_path) return;
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `<img src="${THUMB+i.backdrop_path}"><div class="card-name">${i.title||i.name}</div>`;
            card.onclick = () => { ov.style.display="none"; openPlayer(i); };
            grid.appendChild(card);
        });
    } else ov.style.display = "none";
};

init();
</script>
</body>
</html>
