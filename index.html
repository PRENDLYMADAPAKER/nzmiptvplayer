<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>NZM FLIX | Elite TV Edition</title>
    <style>
        :root { 
            --red: #E50914; 
            --blue: #3D82FF;
            --bg: #000; 
            --card-w: clamp(145px, 15vw, 200px); 
            --card-h: calc(var(--card-w) * 1.5);
        }
        
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            overflow-x: hidden; -webkit-tap-highlight-color: transparent; 
        }

        /* TV Focus Highlight - Higher contrast for TV screens */
        [tabindex="0"]:focus {
            outline: 4px solid white !important;
            transform: scale(1.08);
            z-index: 999;
            transition: 0.2s ease;
            box-shadow: 0 0 25px var(--red);
        }

        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(229, 9, 20, 0.1); border-top: 4px solid var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        header { position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: space-between; padding: 20px 5%; box-sizing: border-box; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        .logo { color: var(--red); font-size: 28px; font-weight: 900; cursor: pointer; outline: none; }

        .hero { height: 75vh; background: center top/cover; position: relative; display: flex; align-items: flex-end; padding: 0 5% 60px; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 10%, transparent 80%); }
        .hero-body { position: relative; z-index: 10; max-width: 700px; }

        .section { padding: 35px 0 0 5%; }
        .row { display: flex; gap: 18px; overflow-x: auto; padding: 15px 0 30px; scrollbar-width: none; }
        .row::-webkit-scrollbar { display: none; }

        .card { min-width: var(--card-w); width: var(--card-w); cursor: pointer; border-radius: 6px; position: relative; outline: none; }
        .card img { width: 100%; height: var(--card-h); object-fit: cover; border-radius: 6px; background: #111; pointer-events: none; }
        .card-name { font-size: 13px; margin-top: 10px; text-align: center; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .modal { position: fixed; inset: 0; background: #000; z-index: 2500; display: none; overflow-y: auto; }
        .modal-content { display: flex; flex-direction: column; width: 100%; }
        
        /* TV-Style Side-by-Side Modal */
        @media (min-width: 1024px) {
            .modal-content { flex-direction: row-reverse; padding: 60px 5%; gap: 40px; }
            .video-wrap { width: 60% !important; border-radius: 12px; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,1); }
            .info-wrap { flex: 1; max-height: 85vh; overflow-y: auto; }
        }

        .video-wrap { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        .btn-red { background: var(--red); color: white; width: 100%; padding: 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 15px; outline: none; }
        .srv-bar { display: flex; gap: 10px; margin: 15px 0; overflow-x: auto; }
        .srv-btn { background: #222; color: #888; padding: 12px 24px; border-radius: 5px; border: 1px solid #333; cursor: pointer; outline: none; white-space: nowrap; }
        .srv-btn.active { background: var(--blue); color: white; border-color: var(--blue); }

        .ep-card { display: flex; gap: 15px; padding: 12px; background: #111; border-radius: 8px; margin-bottom: 10px; cursor: pointer; outline: none; }
        .ep-card.playing { border-left: 5px solid var(--red); background: #1a1a1a; }
        .ep-thumb { width: 130px; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px; }
        
        .close-btn { position: fixed; top: 20px; right: 20px; z-index: 3000; background: rgba(0,0,0,0.8); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 24px; cursor: pointer; }

        #searchView { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; padding: 110px 5% 50px; overflow-y: auto; }
        .search-bar { width: 100%; max-width: 600px; display: block; margin: 0 auto 40px; padding: 18px 30px; background: #111; border: 2px solid #333; color: white; border-radius: 50px; font-size: 20px; outline: none; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<header id="nav">
    <div class="logo" tabindex="0" onclick="location.reload()">NZM FLIX</div>
    <div class="search-icon" tabindex="0" onclick="toggleSearch()" style="cursor:pointer; font-size: 24px;">🔍</div>
</header>

<main id="home">
    <div id="hero" class="hero"></div>
    <div class="section" id="lastWatchedSec" style="display:none;">
        <h3>Last Watched <small onclick="clearHist()" style="color:var(--red); cursor:pointer; margin-left:10px;">[Clear]</small></h3>
        <div class="row" id="last-row"></div>
    </div>
    <div class="section"><h3>Trending Now</h3><div class="row" id="trend-row"></div></div>
    <div class="section"><h3>K-Drama</h3><div class="row" id="kdrama-row"></div></div>
    <div class="section"><h3>Action</h3><div class="row" id="action-row"></div></div>
</main>

<div id="searchView">
    <input type="text" id="searchInput" class="search-bar" placeholder="Search movies or shows...">
    <div class="row" style="flex-wrap:wrap; justify-content:center; gap: 20px;" id="searchRes"></div>
</div>

<div class="modal" id="pModal">
    <button class="close-btn" tabindex="0" onclick="closeM()">✕</button>
    <div class="modal-content">
        <div class="video-wrap" id="vidContainer" tabindex="0">
            <iframe id="frame" allowfullscreen allow="autoplay"></iframe>
        </div>
        <div class="info-wrap" style="padding: 20px;">
            <div id="meta"></div>
            <div class="srv-bar">
                <button class="srv-btn active" tabindex="0" onclick="setSrv(1, this)">Server 1</button>
                <button class="srv-btn" tabindex="0" onclick="setSrv(2, this)">Server 2</button>
                <button class="srv-btn" tabindex="0" onclick="setSrv(3, this)">Server 3</button>
            </div>
            <div id="tvUI" style="display:none; margin-top:20px;">
                <select id="seasonSelect" tabindex="0" onchange="loadEps()" style="width:100%; padding:15px; background:#222; color:white; border:none; border-radius:8px;"></select>
                <div id="epList" style="margin-top:20px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
const KEY = "2f7637ba9b3253a84483afa03480473a", IMG = "https://image.tmdb.org/t/p/original", POSTER = "https://image.tmdb.org/t/p/w500";
let active = null, srv = 1, curEp = {s:1,e:1};

async function api(p) { return (await fetch(`https://api.themoviedb.org/3${p}${p.includes('?')?'&':'?'}api_key=${KEY}`)).json(); }

// --- TV NAVIGATION ENGINE ---
document.addEventListener('keydown', (e) => {
    const focusables = Array.from(document.querySelectorAll('[tabindex="0"]')).filter(el => el.offsetParent !== null);
    if(focusables.length === 0) return;

    let current = document.activeElement;
    let next = null;

    const getCenter = (el) => {
        const r = el.getBoundingClientRect();
        return { x: r.left + r.width/2, y: r.top + r.height/2 };
    };

    const curC = getCenter(current);

    if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) {
        e.preventDefault();
        let bestDist = Infinity;

        focusables.forEach(el => {
            if (el === current) return;
            const elC = getCenter(el);
            const dx = elC.x - curC.x;
            const dy = elC.y - curC.y;

            let valid = false;
            if (e.key === "ArrowRight" && dx > 10 && Math.abs(dy) < Math.abs(dx)) valid = true;
            if (e.key === "ArrowLeft" && dx < -10 && Math.abs(dy) < Math.abs(dx)) valid = true;
            if (e.key === "ArrowDown" && dy > 10 && Math.abs(dx) < Math.abs(dy)) valid = true;
            if (e.key === "ArrowUp" && dy < -10 && Math.abs(dx) < Math.abs(dy)) valid = true;

            if (valid) {
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < bestDist) {
                    bestDist = dist;
                    next = el;
                }
            }
        });
    }

    if (next) {
        next.focus();
        next.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
    }
});

// --- CORE FUNCTIONS ---
async function init() {
    renderHistory();
    const tr = await api('/trending/all/week');
    setHero(tr.results[0]);
    fill('trend-row', tr.results);
    fill('kdrama-row', (await api('/discover/tv?with_original_language=ko&sort_by=popularity.desc')).results);
    fill('action-row', (await api('/discover/movie?with_genres=28&sort_by=popularity.desc')).results);
    document.getElementById('loader').style.display="none";
    setTimeout(() => document.querySelector('.logo').focus(), 500);
}

function fill(id, data) {
    const r = document.getElementById(id);
    data.forEach(i => {
        if(!i.poster_path) return;
        const c = document.createElement('div'); c.className='card'; c.tabIndex=0;
        c.innerHTML=`<img src="${POSTER+i.poster_path}"><div class="card-name">${i.title||i.name}</div>`;
        c.onclick=() => { curEp={s:1,e:1}; openM(i); };
        r.appendChild(c);
    });
}

function setHero(i) {
    const h = document.getElementById('hero');
    h.style.backgroundImage = `url(${IMG+(i.backdrop_path||i.poster_path)})`;
    h.innerHTML = `<div class="hero-overlay"></div><div class="hero-body">
        <h1>${i.title||i.name}</h1>
        <button class="btn-red" style="width:auto;padding:12px 40px;" tabindex="0" onclick='openM(${JSON.stringify(i).replace(/'/g,"")})'>WATCH NOW</button>
    </div>`;
}

async function openM(i) {
    active = i;
    document.getElementById('pModal').style.display='block';
    document.body.style.overflow='hidden';
    
    const type = i.first_air_date ? 'tv' : 'movie';
    document.getElementById('meta').innerHTML = `<h2>${i.title||i.name}</h2><p style="color:#888;">${i.overview.slice(0,200)}...</p>
        <button class="btn-red" tabindex="0" onclick="watch()">🚀 PLAY NOW</button>`;

    if(type === 'tv') {
        document.getElementById('tvUI').style.display='block';
        const d = await api(`/tv/${i.id}`);
        document.getElementById('seasonSelect').innerHTML = d.seasons.filter(s => s.season_number > 0)
            .map(s => `<option value="${s.season_number}">Season ${s.season_number}</option>`).join('');
        loadEps();
    }
}

async function loadEps() {
    const s = document.getElementById('seasonSelect').value;
    const d = await api(`/tv/${active.id}/season/${s}`);
    document.getElementById('epList').innerHTML = d.episodes.map(e => `
        <div class="ep-card" tabindex="0" onclick="playEp(${s},${e.episode_number})">
            <img class="ep-thumb" src="${e.still_path?POSTER+e.still_path:''}">
            <div><b>${e.episode_number}. ${e.name}</b></div>
        </div>
    `).join('');
}

function playEp(s, e) { curEp = {s,e}; watch(); }

function watch() {
    const type = active.first_air_date ? 'tv' : 'movie';
    const id = active.id;
    const { s, e } = curEp;
    let url = "";

    if(srv === 1) url = `https://vidsync.xyz/embed/${type}/${id}${type==='tv'?`/${s}/${e}`:''}`;
    else if(srv === 2) url = `https://vidsrc.cc/v2/embed/${type}/${id}${type==='tv'?`/${s}/${e}`:''}`;
    else url = `https://vidsrc.pro/embed/${type}/${id}${type==='tv'?`/${s}/${e}`:''}`;

    document.getElementById('frame').src = url;
    document.getElementById('vidContainer').focus();
}

function setSrv(n, b) {
    srv = n;
    document.querySelectorAll('.srv-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    if(document.getElementById('frame').src) watch();
}

function closeM() {
    document.getElementById('pModal').style.display='none';
    document.getElementById('frame').src='';
    document.body.style.overflow='auto';
}

function toggleSearch() {
    const s = document.getElementById('searchView');
    s.style.display = (s.style.display === 'block') ? 'none' : 'block';
    if(s.style.display === 'block') document.getElementById('searchInput').focus();
}

// History logic
function renderHistory() {
    const list = JSON.parse(localStorage.getItem('nzm_history') || '[]');
    const row = document.getElementById('last-row');
    if(list.length > 0) {
        document.getElementById('lastWatchedSec').style.display = 'block';
        row.innerHTML = '';
        list.forEach(i => {
            const c = document.createElement('div'); c.className = 'card'; c.tabIndex = 0;
            c.innerHTML = `<img src="${POSTER+i.poster_path}"><div class="card-name">${i.title||i.name}</div>`;
            c.onclick = () => openM(i);
            row.appendChild(c);
        });
    }
}

init();
</script>
</body>
</html>
