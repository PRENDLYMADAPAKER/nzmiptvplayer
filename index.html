<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZM FLIX | Ultra</title>
    <style>
        :root { --red: #e50914; --bg: #141414; --card-w: 160px; --card-h: 90px; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; overflow-x: hidden; }
        
        /* --- HEADER --- */
        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; 
            justify-content: space-between; align-items: center; padding: 15px 4%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            transition: 0.3s; box-sizing: border-box;
        }
        header.scrolled { background: #000; padding: 10px 4%; }
        header h2 { color: var(--red); margin: 0; font-size: 24px; font-weight: 900; cursor: pointer; }
        .search-box { background: rgba(0,0,0,0.5); border: 1px solid #777; padding: 5px 10px; border-radius: 4px; }
        #search { background: transparent; border: none; color: white; outline: none; width: 100px; transition: 0.3s; }
        #search:focus { width: 180px; }

        /* --- HERO --- */
        .hero { height: 70vh; display: flex; align-items: center; padding: 0 4%; background-size: cover; background-position: center; position: relative; }
        .hero::after { content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 60%; background: linear-gradient(to top, var(--bg), transparent); }
        .hero-info { position: relative; z-index: 2; max-width: 500px; }
        .hero-info h1 { font-size: 2.5rem; margin: 0 0 15px 0; }
        .btn-play { background: white; color: black; border: none; padding: 12px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1rem; }

        /* --- ROWS --- */
        .section { padding: 20px 0 5px 4%; }
        .row { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; }
        .row::-webkit-scrollbar { display: none; }
        .card { min-width: var(--card-w); height: var(--card-h); border-radius: 4px; overflow: hidden; position: relative; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: scale(1.1); z-index: 10; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-t { position: absolute; bottom: 0; width: 100%; padding: 5px; background: rgba(0,0,0,0.7); font-size: 10px; text-align: center; }

        /* --- PLAYER & FULLSCREEN --- */
        .player-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: none; overflow-y: auto; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        .video-container iframe { width: 100%; height: 100%; border: none; }
        
        .details-box { padding: 25px 4%; }
        .meta { color: #46d369; font-weight: bold; margin-bottom: 10px; font-size: 14px; }
        .ep-row { display: flex; gap: 12px; padding: 15px 0; border-bottom: 1px solid #333; cursor: pointer; }
        .ep-img { width: 120px; height: 68px; object-fit: cover; border-radius: 4px; }
        .ep-text b { display: block; font-size: 14px; margin-bottom: 5px; }
        .ep-text p { font-size: 11px; color: #999; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        #searchOverlay { position: fixed; top: 60px; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1500; display: none; padding: 20px 4%; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .close-p { position: fixed; top: 15px; left: 15px; z-index: 3000; background: rgba(0,0,0,0.5); border: none; color: #fff; width: 35px; height: 35px; border-radius: 50%; font-size: 20px; }
    </style>
</head>
<body>

<header id="nav">
    <h2 onclick="location.reload()">NZM FLIX</h2>
    <div class="search-box">
        <input id="search" placeholder="Search..." autocomplete="off">
    </div>
</header>

<div id="hero" class="hero"></div>

<div class="section"><h3>Trending Now</h3><div class="row" id="trending"></div></div>
<div class="section"><h3>Anime</h3><div class="row" id="anime"></div></div>
<div class="section"><h3>K-Drama</h3><div class="row" id="kdrama"></div></div>

<div id="searchOverlay"><div class="grid" id="searchGrid"></div></div>

<div class="player-modal" id="player">
    <button class="close-p" onclick="closePlayer()">✕</button>
    <div class="video-container" id="vContainer">
        <iframe id="frame" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>
    <div class="details-box" id="pDetails"></div>
    <div style="padding: 0 4% 40px">
        <select id="seasonSel" onchange="loadEpsBySeason()" style="background:#333; color:white; border:none; padding:10px; width:150px; margin-bottom:15px; border-radius:4px;"></select>
        <div id="epList"></div>
    </div>
</div>

<script>
const API = "2f7637ba9b3253a84483afa03480473a";
const IMG = "https://image.tmdb.org/t/p/original";
const THUMB = "https://image.tmdb.org/t/p/w500";
let curId = null;

async function api(path) { return (await fetch(`https://api.themoviedb.org/3${path}${path.includes('?') ? '&' : '?'}api_key=${API}`)).json(); }

async function init() {
    const t = await api('/trending/all/day');
    setHero(t.results[0]);
    fill('trending', t.results);
    const a = await api('/discover/tv?with_genres=16&with_original_language=ja');
    fill('anime', a.results);
    const k = await api('/discover/tv?with_genres=18&with_original_language=ko');
    fill('kdrama', k.results);
}

function fill(id, list) {
    const row = document.getElementById(id);
    list.forEach(i => {
        if(!i.backdrop_path) return;
        const c = document.createElement('div'); c.className = 'card';
        c.innerHTML = `<img src="${THUMB+i.backdrop_path}"><div class="card-t">${i.title || i.name}</div>`;
        c.onclick = () => openPlayer(i);
        row.appendChild(c);
    });
}

function setHero(i) {
    const h = document.getElementById('hero');
    h.style.backgroundImage = `linear-gradient(to right, #141414, transparent), url(${IMG+i.backdrop_path})`;
    h.innerHTML = `<div class="hero-info"><h1>${i.title || i.name}</h1><button class="btn-play" onclick='openPlayer(${JSON.stringify(i).replace(/'/g,"")})'>▶ Play</button></div>`;
}

async function openPlayer(i) {
    const p = document.getElementById('player');
    const f = document.getElementById('frame');
    p.style.display = "block"; document.body.style.overflow = "hidden";
    
    const type = i.first_air_date ? 'tv' : 'movie';
    const v = await api(`/${type}/${i.id}/videos`);
    const trailer = v.results.find(x => x.type === "Trailer") || v.results[0];
    if(trailer) f.src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1&rel=0`;

    document.getElementById('pDetails').innerHTML = `
        <div class="meta">${Math.round(i.vote_average*10)}% Match • ${i.release_date || i.first_air_date || ""}</div>
        <h2>${i.title || i.name}</h2>
        <p style="color:#aaa; font-size:14px; line-height:1.4">${i.overview}</p>
        <button onclick="startStream(${i.id}, '${type}')" style="background:white; color:black; border:none; padding:15px; width:100%; font-weight:bold; border-radius:4px; margin-top:10px;">▶ Play Full Content</button>
    `;

    if(type === 'tv') { curId = i.id; loadSeasons(i.id); } 
    else { document.getElementById('seasonSel').style.display='none'; document.getElementById('epList').innerHTML=""; }
}

async function loadSeasons(id) {
    const d = await api(`/tv/${id}`);
    const s = document.getElementById('seasonSel'); s.style.display='block'; s.innerHTML="";
    d.seasons.forEach(x => { if(x.season_number > 0) s.innerHTML += `<option value="${x.season_number}">Season ${x.season_number}</option>`; });
    loadEpsBySeason();
}

async function loadEpsBySeason() {
    const sNum = document.getElementById('seasonSel').value;
    const d = await api(`/tv/${curId}/season/${sNum}`);
    const list = document.getElementById('epList'); list.innerHTML="";
    d.episodes.forEach(e => {
        const row = document.createElement('div'); row.className='ep-row';
        row.onclick = () => startStream(curId, 'tv', sNum, e.episode_number);
        row.innerHTML = `<img class="ep-img" src="${THUMB+e.still_path}"><div class="ep-text"><b>${e.episode_number}. ${e.name}</b><p>${e.overview}</p></div>`;
        list.appendChild(row);
    });
}

function startStream(id, type, s=1, e=1) {
    const f = document.getElementById('frame');
    const v = document.getElementById('vContainer');
    
    // TRICK: Request Fullscreen on the container
    if (v.requestFullscreen) v.requestFullscreen();
    else if (v.webkitRequestFullscreen) v.webkitRequestFullscreen();
    
    f.src = type === 'tv' ? `https://vidsync.xyz/embed/tv/${id}/${s}/${e}?autoPlay=true` : `https://vidsync.xyz/embed/movie/${id}?autoPlay=true`;
}

function closePlayer() { 
    document.getElementById('player').style.display="none"; 
    document.getElementById('frame').src=""; 
    document.body.style.overflow="auto";
    if (document.fullscreenElement) document.exitFullscreen();
}

/* --- SEARCH LOGIC --- */
document.getElementById('search').oninput = async (e) => {
    const q = e.target.value;
    const ov = document.getElementById('searchOverlay');
    const grid = document.getElementById('searchGrid');
    if(q.length > 2) {
        ov.style.display="block";
        const d = await api(`/search/multi?query=${q}`);
        grid.innerHTML = "";
        d.results.forEach(i => {
            if(!i.backdrop_path) return;
            const c = document.createElement('div'); c.className='card';
            c.innerHTML = `<img src="${THUMB+i.backdrop_path}"><div class="card-t">${i.title || i.name}</div>`;
            c.onclick = () => { ov.style.display="none"; openPlayer(i); };
            grid.appendChild(c);
        });
    } else ov.style.display="none";
};

window.onscroll = () => { const n = document.getElementById('nav'); window.scrollY > 50 ? n.classList.add('scrolled') : n.classList.remove('scrolled'); };
init();
</script>
</body>
</html>
