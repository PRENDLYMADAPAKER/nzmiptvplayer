<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="origin">
    <title>NZM FLIX | Premium Cinema</title>
    <style>
        :root { 
            --red: #E50914; --bg: #000000; --card-w: 155px; --card-h: 230px;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        @media (min-width: 1200px) { :root { --card-w: 190px; --card-h: 280px; } }

        body { margin: 0; background: var(--bg); color: white; font-family: var(--font-main); overflow-x: hidden; }

        /* LOADER */
        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; transition: 0.6s; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(229, 9, 20, 0.1); border-top: 4px solid var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* NAVIGATION */
        header { position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; box-sizing: border-box; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); transition: 0.3s; }
        header.scrolled { background: var(--bg); border-bottom: 1px solid #222; }
        .logo { color: var(--red); font-size: 28px; font-weight: 900; letter-spacing: -1.5px; cursor: pointer; text-decoration: none; }

        /* HERO */
        .hero { height: 75vh; background-size: cover; background-position: center top; position: relative; display: flex; align-items: flex-end; padding: 0 5% 60px; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 10%, transparent 80%); }
        .hero-body { position: relative; z-index: 10; max-width: 700px; }
        .hero-body h1 { font-size: clamp(2.5rem, 6vw, 3.5rem); margin: 0; font-weight: 800; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }

        /* ROWS */
        .section { padding: 30px 0 0 5%; }
        .section h3 { font-size: 1.4rem; margin-bottom: 10px; color: #e5e5e5; }
        .row { display: flex; gap: 15px; overflow-x: auto; padding: 15px 0 35px; scroll-behavior: smooth; }
        .row::-webkit-scrollbar { display: none; }

        .card { min-width: var(--card-w); width: var(--card-w); cursor: pointer; border-radius: 4px; transition: 0.3s; outline: none; border: 3px solid transparent; }
        .card:focus, .card:hover { transform: scale(1.08); border-color: white; z-index: 10; }
        .card-img { width: 100%; height: var(--card-h); object-fit: cover; border-radius: 4px; background: #111; }
        .card-name { font-size: 14px; font-weight: 600; margin-top: 10px; color: #b3b3b3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; }

        /* MODAL & PLAYER */
        .modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .modal-content { display: flex; flex-direction: column; width: 100%; }
        @media (min-width: 1024px) {
            .modal-content { flex-direction: row-reverse; padding: 80px 5%; gap: 50px; max-width: 1400px; margin: 0 auto; align-items: flex-start; }
            .video-wrap { width: 450px !important; flex-shrink: 0; position: sticky; top: 100px; border-radius: 8px; overflow: hidden; }
            .info-wrap { flex: 1; padding: 0 !important; }
        }

        .video-wrap { width: 100%; aspect-ratio: 16/9; background: #111; position: relative; }
        iframe { width: 100%; height: 100%; border: none; z-index: 5; position: relative; }
        
        .loading-text { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; color: #555; font-size: 14px; z-index: 1; }

        .btn { padding: 12px 25px; border-radius: 4px; font-weight: bold; border: none; cursor: pointer; font-size: 16px; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-white { background: white; color: black; }
        .btn-red { background: var(--red); color: white; width: 100%; margin-top: 15px; justify-content: center; }

        /* SERVER SWITCHER */
        .server-bar { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        .server-btn { background: #222; color: #aaa; padding: 8px 15px; border-radius: 4px; font-size: 12px; border: 1px solid #333; cursor: pointer; }
        .server-btn.active { background: var(--red); color: white; border-color: var(--red); }

        /* EPISODES */
        .season-sel { background: #222; color: white; border: 1px solid #444; padding: 10px; border-radius: 4px; margin-bottom: 20px; width: 100%; max-width: 200px; }
        .ep-card { display: flex; gap: 15px; padding: 10px; border-radius: 6px; cursor: pointer; background: #111; margin-bottom: 8px; border: 1px solid transparent; }
        .ep-card:hover { border-color: #444; background: #1a1a1a; }
        .ep-thumb { width: 120px; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px; }
        .ep-info b { font-size: 14px; display: block; margin-bottom: 4px; }
        .ep-info p { font-size: 12px; color: #888; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .close-btn { position: fixed; top: 20px; right: 20px; z-index: 3000; background: rgba(0,0,0,0.8); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; cursor: pointer; }
        
        #searchView { position: fixed; inset: 0; background: var(--bg); z-index: 1500; display: none; padding: 100px 5%; overflow-y: auto; }
        .search-box { width: 100%; max-width: 500px; display: block; margin: 0 auto 40px; padding: 15px 25px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 50px; font-size: 18px; outline: none; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<header id="nav">
    <div class="logo" onclick="location.reload()">NZM FLIX</div>
    <div onclick="toggleSearch()" style="cursor:pointer; font-size: 22px;">🔍</div>
</header>

<main id="home">
    <div id="hero" class="hero"></div>
    <div class="section"><h3>Top Philippines</h3><div class="row" id="ph-row"></div></div>
    <div class="section"><h3>Trending Now</h3><div class="row" id="trending-row"></div></div>
    <div class="section"><h3>Anime Universe</h3><div class="row" id="anime-row"></div></div>
    <div class="section"><h3>K-Drama</h3><div class="row" id="kdrama-row"></div></div>
</main>

<div class="modal" id="playerModal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-content">
        <div class="video-wrap" id="vidArea">
            <div class="loading-text">Requesting secure stream from server...</div>
            <iframe id="mainFrame" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>
        <div class="info-wrap">
            <div id="metaContent"></div>
            
            <div id="serverUI">
                <p style="font-size: 12px; color: #666; margin-bottom: 8px;">SWITCH SERVER (If stuck or slow):</p>
                <div class="server-bar">
                    <button class="server-btn active" onclick="changeServer(1, this)">Server 1 (Fast)</button>
                    <button class="server-btn" onclick="changeServer(2, this)">Server 2 (Backup)</button>
                    <button class="server-btn" onclick="changeServer(3, this)">Server 3 (HD)</button>
                </div>
            </div>

            <div id="tvUI" style="display:none; margin-top: 20px;">
                <select id="seasonSelect" class="season-sel" onchange="loadEpisodes()"></select>
                <div id="episodeList"></div>
            </div>
        </div>
    </div>
</div>

<div id="searchView">
    <input type="text" id="searchInput" class="search-box" placeholder="Search movies or shows...">
    <div class="row" style="flex-wrap: wrap; justify-content: center; gap: 20px;" id="searchRes"></div>
</div>

<script>
const KEY = "2f7637ba9b3253a84483afa03480473a";
const IMG = "https://image.tmdb.org/t/p/original";
const POSTER = "https://image.tmdb.org/t/p/w500";
let activeItem = null;
let currentServer = 1;
let currentEp = { s: 1, e: 1 };

async function api(path) {
    const r = await fetch(`https://api.themoviedb.org/3${path}${path.includes('?') ? '&' : '?'}api_key=${KEY}`);
    return r.json();
}

async function init() {
    const phData = await api('/trending/all/day?region=PH');
    setHero(phData.results[0]);
    renderRow('ph-row', phData.results);
    renderRow('trending-row', (await api('/trending/all/week')).results);
    renderRow('anime-row', (await api('/discover/tv?with_genres=16&with_keywords=210024')).results);
    renderRow('kdrama-row', (await api('/discover/tv?with_original_language=ko')).results);
    document.getElementById('loader').style.display = "none";
}

function renderRow(id, data) {
    const container = document.getElementById(id);
    data.forEach(i => {
        if(!i.poster_path) return;
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<img class="card-img" src="${POSTER + i.poster_path}" loading="lazy"><div class="card-name">${i.title || i.name}</div>`;
        card.onclick = () => openModal(i);
        container.appendChild(card);
    });
}

function setHero(i) {
    const h = document.getElementById('hero');
    h.style.backgroundImage = `url(${IMG + (i.backdrop_path || i.poster_path)})`;
    h.innerHTML = `<div class="hero-overlay"></div>
    <div class="hero-body">
        <h1>${i.title || i.name}</h1>
        <p style="color:#ccc; margin: 15px 0; font-size:16px; max-width: 600px;">${i.overview.slice(0, 120)}...</p>
        <button class="btn btn-white" onclick='openModal(${JSON.stringify(i).replace(/'/g,"")})'>▶ Watch Trailer</button>
    </div>`;
}

async function openModal(i) {
    activeItem = i;
    currentEp = { s: 1, e: 1 };
    document.getElementById('playerModal').style.display = "block";
    document.body.style.overflow = "hidden";

    const type = i.first_air_date ? 'tv' : 'movie';
    const videos = await api(`/${type}/${i.id}/videos`);
    const trailer = videos.results.find(v => v.type === "Trailer") || videos.results[0];
    if(trailer) document.getElementById('mainFrame').src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1`;

    document.getElementById('metaContent').innerHTML = `
        <h2 style="margin:0;">${i.title || i.name}</h2>
        <p style="color:#aaa; font-size:14px; margin: 10px 0 20px;">${i.overview}</p>
        <button class="btn btn-red" onclick="watchFull()">▶ WATCH FULL CONTENT</button>
    `;

    if(type === 'tv') {
        document.getElementById('tvUI').style.display = 'block';
        const d = await api(`/tv/${i.id}`);
        const sel = document.getElementById('seasonSelect');
        sel.innerHTML = d.seasons.filter(s => s.season_number > 0).map(s => `<option value="${s.season_number}">Season ${s.season_number}</option>`).join('');
        loadEpisodes();
    } else {
        document.getElementById('tvUI').style.display = 'none';
    }
}

async function loadEpisodes() {
    const s = document.getElementById('seasonSelect').value || 1;
    const d = await api(`/tv/${activeItem.id}/season/${s}`);
    const list = document.getElementById('episodeList');
    list.innerHTML = d.episodes.map(e => `
        <div class="ep-card" onclick="playEpisode(${s}, ${e.episode_number})">
            <img class="ep-thumb" src="${e.still_path ? POSTER + e.still_path : ''}">
            <div class="ep-info">
                <b>${e.episode_number}. ${e.name}</b>
                <p>${e.overview || 'No description available.'}</p>
            </div>
        </div>
    `).join('');
}

function playEpisode(s, e) {
    currentEp = { s, e };
    watchFull();
}

function changeServer(num, btn) {
    currentServer = num;
    document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if(document.getElementById('mainFrame').src.includes('youtube')) return; // Don't switch if still on trailer
    watchFull();
}

function watchFull() {
    const id = activeItem.id;
    const type = activeItem.first_air_date ? 'tv' : 'movie';
    const f = document.getElementById('mainFrame');
    const { s, e } = currentEp;

    let url = "";
    if (currentServer === 1) {
        url = type === 'tv' ? `https://vidsync.xyz/embed/tv/${id}/${s}/${e}` : `https://vidsync.xyz/embed/movie/${id}`;
    } else if (currentServer === 2) {
        url = type === 'tv' ? `https://vidsrc.me/embed/tv?tmdb=${id}&sea=${s}&epi=${e}` : `https://vidsrc.me/embed/movie?tmdb=${id}`;
    } else {
        url = type === 'tv' ? `https://vidsrc.pro/embed/tv/${id}/${s}/${e}` : `https://vidsrc.pro/embed/movie/${id}`;
    }

    f.src = url;
}

function closeModal() {
    document.getElementById('playerModal').style.display = "none";
    document.getElementById('mainFrame').src = "";
    document.body.style.overflow = "auto";
}

function toggleSearch() {
    const s = document.getElementById('searchView');
    s.style.display = (s.style.display === 'block') ? 'none' : 'block';
}

document.getElementById('searchInput').oninput = async (e) => {
    const q = e.target.value;
    if(q.length > 2) {
        const d = await api(`/search/multi?query=${q}`);
        const res = document.getElementById('searchRes');
        res.innerHTML = "";
        d.results.forEach(i => {
            if(!i.poster_path) return;
            const c = document.createElement('div');
            c.className = 'card';
            c.innerHTML = `<img class="card-img" src="${POSTER + i.poster_path}"><div class="card-name">${i.title || i.name}</div>`;
            c.onclick = () => { toggleSearch(); openModal(i); };
            res.appendChild(c);
        });
    }
};

init();
</script>
</body>
</html>
